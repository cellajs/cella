---
blockExoticSubdeps: true

publicHoistPattern:
  - pdfjs-dist

minimumReleaseAge: 1440 # 24 hrs
minimumReleaseAgeExclude:
  - "@aws-sdk/*"
  - protobufjs@8.0.2
  - ws@8.20.1
  - prosemirror-model@1.25.7
  - undici@7.24.0
  - brace-expansion@2.0.3
  - brace-expansion@5.0.5
  - picomatch@2.3.2
  - picomatch@4.0.4
  - yaml@2.8.3
  - lodash@4.17.24
  - '@hono/node-server@1.19.13'
  - follow-redirects@1.15.12
  - axios@1.15.0
  - axios@1.15.1
  - axios@1.15.2
  - fast-uri@3.1.1
  - fast-uri@3.1.2
  - '@babel/plugin-transform-modules-systemjs@7.29.4'
  - brace-expansion@5.0.6
  - js-cookie@3.0.6

packages:
  - backend
  - cdc
  - shared
  - cli/*
  - frontend
  - infra
  - locales
  - sdk
  - studio
  - yjs
  - bench

peerDependencyRules:
  ignoreMissing:
    - canvas # using @napi-rs/canvas instead of node-canvas
    - '@floating-ui/dom' # blocknote server-util pulls react tree, not needed server-side
  allowedVersions:
    react: '19' # jsx-email transitive deps haven't declared react 19 support yet
    react-dom: '19'
    '@types/react': '>=19'
    vite: '8' # vite plugins haven't caught up to vite 8
    typescript: '6' # tsconfck hasn't declared ts 6 support yet
    '@uppy/core': '5' # uppy plugins haven't bumped peer range yet
    babel-plugin-react-compiler: '>=19' # pre-release used intentionally
    '@opentelemetry/api': '>=1' # gleap transitive deps haven't caught up

overrides:
  # Intentional pins
  "@tiptap/pm": "3.22.5"
  "@tiptap/core": "3.22.5"
  "prosemirror-model": "1.25.7"
  "prosemirror-view": "1.41.7"
  # Security overrides still doing work (floor matches installed version, or pulled in by transitive dep)
  "esbuild@<=0.24.2": ">=0.25.0" # @esbuild-kit/core-utils -> drizzle-kit 0.31 still pulls 0.18.20 without this
  "serialize-javascript@<7.0.5": ">=7.0.5"
  protobufjs@>=8.0.0 <=8.0.1: ^8.0.2
  ws@>=8.0.0 <8.20.1: ^8.20.1
  brace-expansion@>=5.0.0 <5.0.6: ^5.0.6
  fast-uri@<=3.1.1: ^3.1.2
  picomatch@<2.3.2: ^2.3.2
  picomatch@>=4.0.0 <4.0.4: ^4.0.4
  "uuid@<14.0.0": ">=14.0.0"

allowBuilds:
  esbuild: true
  '@evilmartians/lefthook': true
  '@parcel/watcher': false
  '@playwright/browser-chromium': false
  core-js: false
  protobufjs: false
  unix-dgram: false
