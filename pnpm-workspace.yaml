---
blockExoticSubdeps: true

publicHoistPattern:
  - pdfjs-dist

minimumReleaseAge: 1440 # 24 hrs
minimumReleaseAgeExclude:
  - "@aws-sdk/*"
  - protobufjs@8.0.2
  - ws@8.20.1
  - prosemirror-model@1.25.7
  - undici@7.24.0
  - brace-expansion@2.0.3
  - brace-expansion@5.0.5
  - picomatch@2.3.2
  - picomatch@4.0.4
  - yaml@2.8.3
  - lodash@4.17.24
  - '@hono/node-server@1.19.13'
  - follow-redirects@1.15.12
  - axios@1.15.0
  - axios@1.15.1
  - axios@1.15.2
  - fast-uri@3.1.1
  - fast-uri@3.1.2
  - '@babel/plugin-transform-modules-systemjs@7.29.4'
  - brace-expansion@5.0.6
  - js-cookie@3.0.6

packages:
  - backend
  - cdc
  - shared
  - cli/*
  - frontend
  - infra
  - locales
  - sdk
  - studio
  - yjs
  - bench

peerDependencyRules:
  ignoreMissing:
    - canvas # using @napi-rs/canvas instead of node-canvas
    - '@floating-ui/dom' # blocknote server-util pulls react tree, not needed server-side
  allowedVersions:
    react: '19' # jsx-email transitive deps haven't declared react 19 support yet
    react-dom: '19'
    '@types/react': '>=19'
    vite: '8' # vite plugins haven't caught up to vite 8
    typescript: '6' # tsconfck hasn't declared ts 6 support yet
    '@uppy/core': '5' # uppy plugins haven't bumped peer range yet
    babel-plugin-react-compiler: '>=19' # pre-release used intentionally
    '@opentelemetry/api': '>=1' # gleap transitive deps haven't caught up

overrides:
  "@tiptap/pm": "3.22.5"
  "@tiptap/core": "3.22.5"
  "prosemirror-model": "1.25.7"
  "prosemirror-view": "1.41.7"
  "esbuild@<=0.24.2": ">=0.25.0"
  "ai@<5.0.52": ">=5.0.52"
  "seroval@<=1.4.0": ">=1.4.1"
  "seroval@<1.4.1": ">=1.4.1"
  "serialize-javascript@<=7.0.2": ">=7.0.3"
  "serialize-javascript@<7.0.5": ">=7.0.5"
  "dompurify@<=3.3.3": ">=3.4.0"
  "hono@<4.12.14": ">=4.12.14"
  "protobufjs@<7.5.5": ">=7.5.5"
  "protobufjs@>=8.0.0 <8.0.1": ">=8.0.1"
  "i18next-http-backend@<3.0.5": ">=3.0.5"
  "dompurify@<3.4.0": ">=3.4.0"
  "dompurify@>=1.0.10 <3.4.0": ">=3.4.0"
  "dompurify@>=3.0.1 <3.4.0": ">=3.4.0"
  "fast-xml-parser@<5.7.0": ">=5.7.0"
  "uuid@<14.0.0": ">=14.0.0"
  "postcss@<8.5.10": ">=8.5.10"
  protobufjs@>=8.0.0 <=8.0.1: ^8.0.2
  ws@>=8.0.0 <8.20.1: ^8.20.1
  '@babel/plugin-transform-modules-systemjs@>=7.12.0 <=7.29.3': ^7.29.4
  '@hono/node-server@<1.19.13': ^1.19.13
  axios@>=1.0.0 <1.15.0: ^1.15.0
  axios@>=1.0.0 <1.15.1: ^1.15.1
  axios@>=1.0.0 <1.15.2: ^1.15.2
  brace-expansion@>=2.0.0 <2.0.3: ^2.0.3
  brace-expansion@>=4.0.0 <5.0.5: ^5.0.5
  brace-expansion@>=5.0.0 <5.0.6: ^5.0.6
  fast-uri@<=3.1.0: ^3.1.1
  fast-uri@<=3.1.1: ^3.1.2
  follow-redirects@<=1.15.11: ^1.15.12
  js-cookie@<=3.0.5: ^3.0.6
  lodash@<=4.17.23: ^4.17.24
  lodash@>=4.0.0 <=4.17.23: ^4.17.24
  picomatch@<2.3.2: ^2.3.2
  picomatch@>=4.0.0 <4.0.4: ^4.0.4
  undici@>=7.0.0 <7.24.0: ^7.24.0
  undici@>=7.17.0 <7.24.0: ^7.24.0
  yaml@>=2.0.0 <2.8.3: ^2.8.3

allowBuilds:
  esbuild: true
  '@evilmartians/lefthook': true
  '@parcel/watcher': false
  '@playwright/browser-chromium': false
  core-js: false
  protobufjs: false
  unix-dgram: false
