---
allowBuilds:
  '@evilmartians/lefthook': true
  '@parcel/watcher': false
  '@playwright/browser-chromium': false
  core-js: false
  esbuild: true
  msgpackr-extract: false
  protobufjs: false
  unix-dgram: false
allowUnusedPatches: true
blockExoticSubdeps: true
minimumReleaseAge: 1440
minimumReleaseAgeExclude:
  - '@cellajs/cli'
  - '@opentelemetry/core@2.8.0'
  - esbuild@0.24.3
  - esbuild@0.28.1
  - js-yaml@4.3.0
  - shell-quote@1.8.5
  - protobufjs@7.6.5
  - '@hono/node-server@2.0.5'
  - fast-uri@3.1.4
  - fast-uri@3.1.3
overrides:
  '@opentelemetry/core@<2.8.0': ^2.8.0
  '@opentelemetry/core@>=2.0.0 <2.8.0': ^2.8.0
  esbuild@<0.28.1: ^0.28.1
  esbuild@>=0.27.3 <0.28.1: ^0.28.1
  'protobufjs@>=8.0.0 <8.4.1': 8.6.5
  '@types/hast': 3.0.5
  '@shikijs/types': 4.3.1
  '@hono/node-server@<2.0.5': ^2.0.5
  fast-uri@>=3.0.0 <3.1.3: ^3.1.3
  fast-uri@>=3.0.0 <=3.1.3: ^3.1.4
  js-yaml@>=4.0.0 <4.3.0: ^4.3.0
  protobufjs@>=7.5.0 <=7.6.4: ^7.6.5
  shell-quote@<=1.8.4: ^1.8.5
packageExtensions:
  '@artilleryio/sketches-js':
    dependencies:
      protobufjs: ^7.2.4
  artillery:
    dependencies:
      esbuild: ^0.28.1
packages:
  - mcp
  - backend
  - cdc
  - shared
  - frontend
  - infra
  - locales
  - sdk
  - studio
  - yjs
  - bench
patchedDependencies:
  artillery@2.0.33: patches/artillery@2.0.33.patch
peerDependencyRules:
  allowedVersions:
    '@opentelemetry/api': '>=1'
    '@types/react': '>=19'
    '@uppy/core': '5'
    babel-plugin-react-compiler: '>=19'
    react: '19'
    react-dom: '19'
    typescript: '6'
    vite: '8'
  ignoreMissing:
    - canvas
    - '@floating-ui/dom'
publicHoistPattern:
  - pdfjs-dist
