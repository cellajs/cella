---
allowBuilds:
  '@evilmartians/lefthook': true
  '@parcel/watcher': false
  '@playwright/browser-chromium': false
  core-js: false
  esbuild: true
  msgpackr-extract: false
  protobufjs: false
  unix-dgram: false
# Allow patches whose package isn't installed in a given filtered install
# (e.g. backend-only Docker build excludes the frontend, where pragmatic-drag-and-drop lives).
allowUnusedPatches: true
blockExoticSubdeps: true
catalog:
  '@types/node': 24.10.13
  '@typescript/native-preview': 7.0.0-dev.20260610.1
  cross-env: ^10.1.0
  hono: ^4.12.25
  tsup: ^8.5.1
  tsx: ^4.22.4
  typescript: ^6.0.3
  vitest: ^4.1.8
catalogMode: strict
minimumReleaseAge: 1440
minimumReleaseAgeExclude:
  - '@aws-sdk/*'
  - protobufjs@8.0.2
  - ws@8.20.1
  - prosemirror-model@1.25.7
  - tmp@0.2.6
  - esbuild@0.25.0
  - protobufjs@8.2.0
  - uuid@11.1.1
  - '@pulumiverse/scaleway@1.50.1'
overrides:
  esbuild@<0.25.0: ^0.25.0
  protobufjs@>=8.0.0 <8.2.0: ^8.2.0
  protobufjs@>=8.0.0 <=8.0.1: ^8.0.2
  uuid@<11.1.1: ^11.1.1
packages:
  - ai
  - backend
  - cdc
  - shared
  - cli/*
  - frontend
  - infra
  - locales
  - sdk
  - studio
  - yjs
  - bench
patchedDependencies:
  '@atlaskit/pragmatic-drag-and-drop@1.8.1': patches/@atlaskit__pragmatic-drag-and-drop@1.8.1.patch
peerDependencyRules:
  allowedVersions:
    '@opentelemetry/api': '>=1'
    '@types/react': '>=19'
    '@uppy/core': '5'
    babel-plugin-react-compiler: '>=19'
    react: '19'
    react-dom: '19'
    typescript: '6'
    vite: '8'
  ignoreMissing:
    - canvas
    - '@floating-ui/dom'
publicHoistPattern:
  - pdfjs-dist
