---
allowBuilds:
  '@evilmartians/lefthook': true
  '@parcel/watcher': false
  '@playwright/browser-chromium': false
  core-js: false
  esbuild: true
  msgpackr-extract: false
  protobufjs: false
  unix-dgram: false
allowUnusedPatches: true
blockExoticSubdeps: true
minimumReleaseAge: 1440
minimumReleaseAgeExclude:
  - '@cellajs/cli'
  - '@opentelemetry/core@2.8.0'
  - esbuild@0.24.3
  - esbuild@0.28.1
overrides:
  '@opentelemetry/core@<2.8.0': ^2.8.0
  esbuild@<0.28.1: ^0.28.1
  esbuild@>=0.27.3 <0.28.1: ^0.28.1
  'protobufjs@>=8.0.0 <8.4.1': 8.6.5
packages:
  - mcp
  - backend
  - cdc
  - shared
  - frontend
  - infra
  - locales
  - sdk
  - studio
  - yjs
  - bench
peerDependencyRules:
  allowedVersions:
    '@opentelemetry/api': '>=1'
    '@types/react': '>=19'
    '@uppy/core': '5'
    babel-plugin-react-compiler: '>=19'
    react: '19'
    react-dom: '19'
    typescript: '6'
    vite: '8'
  ignoreMissing:
    - canvas
    - '@floating-ui/dom'
publicHoistPattern:
  - pdfjs-dist
