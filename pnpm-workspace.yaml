---
blockExoticSubdeps: true

catalog:
  '@types/node': 24.10.13
  '@typescript/native-preview': 7.0.0-dev.20260606.1
  cross-env: ^10.1.0
  tsup: ^8.5.1
  tsx: ^4.22.4
  typescript: ^6.0.3
  vitest: ^4.1.8

catalogMode: strict

publicHoistPattern:
  - pdfjs-dist

minimumReleaseAge: 1440 # 24 hrs
minimumReleaseAgeExclude:
  - '@aws-sdk/*'
  - protobufjs@8.0.2
  - ws@8.20.1
  - prosemirror-model@1.25.7
  - tmp@0.2.6

packages:
  - ai
  - backend
  - cdc
  - shared
  - cli/*
  - frontend
  - infra
  - locales
  - sdk
  - studio
  - yjs
  - bench

peerDependencyRules:
  ignoreMissing:
    - canvas # using @napi-rs/canvas instead of node-canvas
    - '@floating-ui/dom' # blocknote server-util pulls react tree, not needed server-side
  allowedVersions:
    react: '19' # jsx-email transitive deps haven't declared react 19 support yet
    react-dom: '19'
    '@types/react': '>=19'
    vite: '8' # vite plugins haven't caught up to vite 8
    typescript: '6' # tsconfck hasn't declared ts 6 support yet
    '@uppy/core': '5' # uppy plugins haven't bumped peer range yet
    babel-plugin-react-compiler: '>=19' # pre-release used intentionally
    '@opentelemetry/api': '>=1' # gleap transitive deps haven't caught up

overrides:
  '@tiptap/pm': '3.22.5'
  '@tiptap/core': '3.22.5'
  prosemirror-model: '1.25.7'
  prosemirror-view: '1.41.7'
  esbuild@<=0.24.2: '>=0.25.0'
  ai@<5.0.52: '>=5.0.52'
  seroval@<=1.4.0: '>=1.4.1'
  seroval@<1.4.1: '>=1.4.1'
  serialize-javascript@<=7.0.2: '>=7.0.3'
  serialize-javascript@<7.0.5: '>=7.0.5'
  dompurify@<=3.3.3: '>=3.4.0'
  hono@<4.12.14: '>=4.12.14'
  protobufjs@<7.5.5: '>=7.5.5'
  protobufjs@>=8.0.0 <8.0.1: '>=8.0.1'
  i18next-http-backend@<3.0.5: '>=3.0.5'
  dompurify@<3.4.0: '>=3.4.0'
  dompurify@>=1.0.10 <3.4.0: '>=3.4.0'
  dompurify@>=3.0.1 <3.4.0: '>=3.4.0'
  fast-xml-parser@<5.7.0: '>=5.7.0'
  uuid@<14.0.0: '>=14.0.0'
  postcss@<8.5.10: '>=8.5.10'
  protobufjs@>=8.0.0 <=8.0.1: ^8.0.2
  ws@>=8.0.0 <8.20.1: ^8.20.1
  tmp@<0.2.6: ^0.2.6

allowBuilds:
  esbuild: true
  '@evilmartians/lefthook': true
  '@parcel/watcher': false
  '@playwright/browser-chromium': false
  core-js: false
  protobufjs: false
  unix-dgram: false
  msgpackr-extract: false

# Allow patches whose package isn't installed in a given filtered install
# (e.g. backend-only Docker build excludes the frontend, where pragmatic-drag-and-drop lives).
allowUnusedPatches: true

patchedDependencies:
  '@atlaskit/pragmatic-drag-and-drop@1.8.1': patches/@atlaskit__pragmatic-drag-and-drop@1.8.1.patch
