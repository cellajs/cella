# =============================================================================
# Scaleway Deployment Workflow
# =============================================================================
# Deploys Raak to Scaleway infrastructure using Pulumi
# Triggered on pushes to main (production) or manually for other environments
# =============================================================================

name: Deploy

# Deny-by-default: each job opts in to the scopes it actually needs.
permissions: {}

on:
  # Automatic deployment to production on main branch
  push:
    branches:
      - main
    paths:
      - 'backend/**'
      - 'cdc/**'
      - 'yjs/**'
      - 'frontend/**'
      - 'infra/**'
      - 'shared/**'
      - 'locales/**'
      - 'json/**'
      - 'sdk/**'
      - 'package.json'
      - 'pnpm-lock.yaml'
      - 'pnpm-workspace.yaml'
      - '.github/workflows/deploy.yml'

  # Manual deployment for any environment
  workflow_dispatch:
    inputs:
      environment:
        description: 'Environment to deploy to'
        required: true
        default: 'production'
        type: choice
        options:
          - staging
          - production

# Prevent concurrent deployments to the same environment
concurrency:
  group: deploy-${{ github.event.inputs.environment || 'production' }}
  cancel-in-progress: false

env:
  NODE_VERSION: '24'
  SCW_CLI_VERSION: '2.54.0'

jobs:
  # -------------------------------------------------------------------------
  # Determine environment and detect which services changed
  # -------------------------------------------------------------------------
  setup:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    permissions:
      contents: read
    outputs:
      environment: ${{ steps.set-env.outputs.environment }}
      pulumi_stack: ${{ steps.derive.outputs.pulumi_stack }}
      registry_ns: ${{ steps.derive.outputs.registry_ns }}
      frontend_bucket: ${{ steps.derive.outputs.frontend_bucket }}
      state_bucket: ${{ steps.derive.outputs.state_bucket }}
      deploy_tags_bucket: ${{ steps.derive.outputs.deploy_tags_bucket }}
      region: ${{ steps.derive.outputs.region }}
      frontend_url: ${{ steps.derive.outputs.frontend_url }}
      backend_url: ${{ steps.derive.outputs.backend_url }}
      yjs_url: ${{ steps.derive.outputs.yjs_url }}
      ai_url: ${{ steps.derive.outputs.ai_url }}
      image_tag: ${{ steps.set-env.outputs.image_tag }}
      backend: 'true'
      cdc: 'true'
      yjs: 'true'
      frontend: 'true'
      infra: 'true'
    steps:
      - name: Checkout
        uses: actions/checkout@93cb6efe18208431cddfb8368fd83d5badbf9bfd # v5

      - name: Setup pnpm
        uses: pnpm/action-setup@fc06bc1257f339d1d5d8b3a19a8cae5388b55320 # v5

      - name: Setup Node.js
        uses: actions/setup-node@a0853c24544627f65ddf259abe73b1d18a591444 # v5
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'pnpm'

      - name: Install dependencies
        run: pnpm install --frozen-lockfile --filter infra... --filter shared...

      - name: Determine environment
        id: set-env
        env:
          EVENT_NAME: ${{ github.event_name }}
          INPUT_ENV: ${{ github.event.inputs.environment }}
          GIT_REF: ${{ github.ref }}
          GIT_SHA: ${{ github.sha }}
        run: |
          if [ "$EVENT_NAME" = "workflow_dispatch" ]; then
            ENV="$INPUT_ENV"
          else
            ENV="production"
          fi

          # Production deploys must come from main branch
          if [ "$ENV" = "production" ] && [ "$GIT_REF" != "refs/heads/main" ]; then
            echo "::error::Production deploys are only allowed from the main branch (got $GIT_REF)"
            exit 1
          fi

          echo "environment=$ENV" >> $GITHUB_OUTPUT
          echo "image_tag=$GIT_SHA" >> $GITHUB_OUTPUT

      - name: Derive resource names from shared config
        id: derive
        env:
          ENV: ${{ steps.set-env.outputs.environment }}
        run: pnpm --silent --filter infra print-deploy-env "$ENV" >> $GITHUB_OUTPUT



  # -------------------------------------------------------------------------
  # Build and push Docker images
  # -------------------------------------------------------------------------
  build-images:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    needs: [setup]
    permissions:
      contents: read
      id-token: write   # keyless cosign signing via GitHub OIDC
    strategy:
      fail-fast: false
      matrix:
        include:
          - service: backend
            dockerfile: backend/Dockerfile
          - service: cdc
            dockerfile: cdc/Dockerfile
          - service: yjs
            dockerfile: yjs/Dockerfile
          - service: frontend
            dockerfile: infra/caddy/Dockerfile
    environment: ${{ needs.setup.outputs.environment }}
    steps:
      - name: Checkout
        uses: actions/checkout@93cb6efe18208431cddfb8368fd83d5badbf9bfd # v5

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@4d04d5d9486b7bd6fa91e7baf45bbb4f8b9deedd # v4

      - name: Login to Scaleway Container Registry
        uses: docker/login-action@4907a6ddec9925e35a0a9e82d7399ccc52663121 # v4
        with:
          registry: rg.${{ needs.setup.outputs.region }}.scw.cloud
          username: nologin
          password: ${{ secrets.SCW_SECRET_KEY }}

      - name: Build and push ${{ matrix.service }} image
        id: build
        uses: docker/build-push-action@bcafcacb16a39f128d818304e6c9c0c18556b85f # v7
        with:
          context: .
          file: ${{ matrix.dockerfile }}
          push: true
          tags: rg.${{ needs.setup.outputs.region }}.scw.cloud/${{ needs.setup.outputs.registry_ns }}/${{ matrix.service }}:${{ needs.setup.outputs.image_tag }}
          # RELEASE_SHA is baked into the image as ENV so `/health` can return
          # it. The deploy verifier asserts X-App-Version matches GITHUB_SHA
          # before declaring the rollout green.
          build-args: |
            RELEASE_SHA=${{ needs.setup.outputs.image_tag }}
          cache-from: type=gha,scope=${{ matrix.service }}
          cache-to: type=gha,mode=max,scope=${{ matrix.service }}

      # Keyless Sigstore signing via GitHub OIDC. Signature is stored alongside
      # the image in the Scaleway registry as an OCI artifact. Verify later with:
      #   cosign verify --certificate-identity-regexp \
      #     "https://github.com/<owner>/<repo>/.github/workflows/deploy.yml@refs/heads/main" \
      #     --certificate-oidc-issuer https://token.actions.githubusercontent.com \
      #     rg.<region>.scw.cloud/<ns>/<service>@<digest>
      - name: Install cosign
        uses: sigstore/cosign-installer@6f9f17788090df1f26f669e9d70d6ae9567deba6 # v4.1.2

      - name: Sign image with cosign (keyless)
        env:
          IMAGE: rg.${{ needs.setup.outputs.region }}.scw.cloud/${{ needs.setup.outputs.registry_ns }}/${{ matrix.service }}
          DIGEST: ${{ steps.build.outputs.digest }}
        # Retry to ride out transient Sigstore (Fulcio/Rekor) HTTP/2 stream resets
        # that surface as `INTERNAL_ERROR; received from peer`. The sign call is
        # idempotent — re-signing the same digest just appends another signature.
        run: |
          for attempt in 1 2 3 4 5; do
            if cosign sign --yes "${IMAGE}@${DIGEST}"; then
              exit 0
            fi
            echo "::warning::cosign sign attempt $attempt failed; retrying in $((attempt * 5))s"
            sleep $((attempt * 5))
          done
          echo "::error::cosign sign failed after 5 attempts"
          exit 1

  # -------------------------------------------------------------------------
  # Build frontend bundle (no upload). Runs in parallel with build-images so
  # the artifact is ready when publish-frontend gates on backend health.
  # -------------------------------------------------------------------------
  build-frontend:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    needs: [setup]
    permissions:
      contents: read
    environment: ${{ needs.setup.outputs.environment }}
    steps:
      - name: Checkout
        uses: actions/checkout@93cb6efe18208431cddfb8368fd83d5badbf9bfd # v5

      - name: Setup pnpm
        uses: pnpm/action-setup@fc06bc1257f339d1d5d8b3a19a8cae5388b55320 # v5

      - name: Setup Node.js
        uses: actions/setup-node@a0853c24544627f65ddf259abe73b1d18a591444 # v5
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'pnpm'

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build frontend
        run: pnpm --filter frontend build
        env:
          VITE_BACKEND_URL: ${{ needs.setup.outputs.backend_url }}
          VITE_FRONTEND_URL: ${{ needs.setup.outputs.frontend_url }}

      - name: Upload dist artifact
        uses: actions/upload-artifact@b7c566a772e6b6bfb58ed0dc250532a479d7789f # v6
        with:
          name: frontend-dist
          path: frontend/dist
          retention-days: 7
          if-no-files-found: error

  # -------------------------------------------------------------------------
  # Apply Pulumi infrastructure
  # -------------------------------------------------------------------------
  pulumi:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    needs: [setup]
    # contents: read for checkout. The `Sync EDGE_PIPELINE_ID` step writes a repo
    # variable but uses GH_REPO_PAT (the default GITHUB_TOKEN lacks actions:write
    # even if granted here), so no extra scope is needed on this token.
    permissions:
      contents: read
    environment: ${{ needs.setup.outputs.environment }}
    outputs:
      api_url: ${{ steps.outputs.outputs.api_url }}
      frontend_url: ${{ steps.outputs.outputs.frontend_url }}
      pipeline_id: ${{ steps.outputs.outputs.pipeline_id }}
    steps:
      - name: Checkout
        uses: actions/checkout@93cb6efe18208431cddfb8368fd83d5badbf9bfd # v5

      - name: Setup pnpm
        uses: pnpm/action-setup@fc06bc1257f339d1d5d8b3a19a8cae5388b55320 # v5

      - name: Setup Node.js
        uses: actions/setup-node@a0853c24544627f65ddf259abe73b1d18a591444 # v5
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'pnpm'

      # Use the official Pulumi action (SHA-pinned) in install-only mode instead
      # of `curl | sh` to remove unverified runtime downloads from the deploy path.
      # CLI version is pinned to match the @pulumi/pulumi SDK in infra/package.json;
      # bump both together. See https://github.com/pulumi/actions/releases.
      - name: Install Pulumi CLI
        uses: pulumi/actions@8e5e406f4007fca908480587cb9893c07090f58d # v7.0.0
        with:
          pulumi-version: 3.236.0

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Ensure Pulumi state bucket exists
        env:
          SCW_ACCESS_KEY: ${{ secrets.SCW_ACCESS_KEY }}
          SCW_SECRET_KEY: ${{ secrets.SCW_SECRET_KEY }}
        run: pnpm --filter infra ensure-state-bucket

      - name: Login to S3 state backend
        env:
          AWS_ACCESS_KEY_ID: ${{ secrets.SCW_ACCESS_KEY }}
          AWS_SECRET_ACCESS_KEY: ${{ secrets.SCW_SECRET_KEY }}
          STATE_BUCKET: ${{ needs.setup.outputs.state_bucket }}
          REGION: ${{ needs.setup.outputs.region }}
        run: pulumi login "s3://$STATE_BUCKET?endpoint=s3.$REGION.scw.cloud&region=$REGION"

      - name: Select stack and set image tags
        working-directory: infra
        env:
          # AWS_* = state-bucket S3 access only. Scaleway provider credentials and
          # projectId come from the encrypted `scaleway:accessKey` /
          # `scaleway:secretKey` / `scaleway:projectId` stack config values (set
          # by infra/tasks/bootstrap.ts, rotated by .github/workflows/rotate-ci-key.yml).
          # Do NOT set SCW_DEFAULT_PROJECT_ID here — the provider would then see
          # two sources for projectId and emit a "Multiple variable sources" warning.
          AWS_ACCESS_KEY_ID: ${{ secrets.SCW_ACCESS_KEY }}
          AWS_SECRET_ACCESS_KEY: ${{ secrets.SCW_SECRET_KEY }}
          PULUMI_CONFIG_PASSPHRASE: ${{ secrets.PULUMI_CONFIG_PASSPHRASE }}
          STACK: ${{ needs.setup.outputs.pulumi_stack }}
          TAG: ${{ needs.setup.outputs.image_tag }}
        run: |
          pulumi stack select "$STACK"
          pulumi config set infra:backendImageTag "$TAG"
          pulumi config set infra:cdcImageTag "$TAG"
          pulumi config set infra:yjsImageTag "$TAG"

      - name: Ensure stack secrets exist
        # Idempotent: only writes keys not already set. Keeps `pulumi up` from
        # failing when a new required secret (e.g. piiHashSecret) is added to
        # the backend env schema between deploys.
        working-directory: infra
        env:
          AWS_ACCESS_KEY_ID: ${{ secrets.SCW_ACCESS_KEY }}
          AWS_SECRET_ACCESS_KEY: ${{ secrets.SCW_SECRET_KEY }}
          PULUMI_CONFIG_PASSPHRASE: ${{ secrets.PULUMI_CONFIG_PASSPHRASE }}
          STACK: ${{ needs.setup.outputs.pulumi_stack }}
        run: pnpm init-stack-secrets "$STACK"

      # Pulumi prep (checkout, install, login, stack select, secrets) runs in
      # parallel with build-images / build-frontend. Before applying compute
      # changes, wait until the new image tags exist in the registry — cloud-init
      # on a fresh VM does `docker compose pull` immediately, and replaceOnChanges
      # makes every deploy create new VMs.
      #
      # Uses `docker buildx imagetools inspect` because Scaleway's registry
      # rejects Basic auth on /v2/ and requires the Docker bearer-token flow.
      - name: Wait for image tags in registry
        env:
          SCW_SECRET_KEY: ${{ secrets.SCW_SECRET_KEY }}
          REGION: ${{ needs.setup.outputs.region }}
          REGISTRY_NS: ${{ needs.setup.outputs.registry_ns }}
          TAG: ${{ needs.setup.outputs.image_tag }}
        run: |
          set -uo pipefail
          REGISTRY="rg.$REGION.scw.cloud"
          echo "$SCW_SECRET_KEY" | docker login "$REGISTRY" -u nologin --password-stdin >/dev/null
          # 80 × 15s = 20 min ceiling; build-images timeout is 20 min.
          for service in backend cdc yjs; do
            echo "::group::Waiting for $service:$TAG"
            image="$REGISTRY/$REGISTRY_NS/$service:$TAG"
            for i in $(seq 1 80); do
              if docker buildx imagetools inspect "$image" >/dev/null 2>&1; then
                echo "  ready after ${i} attempt(s)"
                break
              fi
              if [ "$i" = "80" ]; then
                echo "::error::$image never appeared in registry"
                docker buildx imagetools inspect "$image" || true
                exit 1
              fi
              sleep 15
            done
            echo "::endgroup::"
          done

      - name: Pulumi up
        working-directory: infra
        env:
          AWS_ACCESS_KEY_ID: ${{ secrets.SCW_ACCESS_KEY }}
          AWS_SECRET_ACCESS_KEY: ${{ secrets.SCW_SECRET_KEY }}
          PULUMI_CONFIG_PASSPHRASE: ${{ secrets.PULUMI_CONFIG_PASSPHRASE }}
          STACK: ${{ needs.setup.outputs.pulumi_stack }}
        run: pulumi up --stack "$STACK" --yes

      - name: Capture stack outputs
        id: outputs
        working-directory: infra
        env:
          AWS_ACCESS_KEY_ID: ${{ secrets.SCW_ACCESS_KEY }}
          AWS_SECRET_ACCESS_KEY: ${{ secrets.SCW_SECRET_KEY }}
          PULUMI_CONFIG_PASSPHRASE: ${{ secrets.PULUMI_CONFIG_PASSPHRASE }}
          STACK: ${{ needs.setup.outputs.pulumi_stack }}
        run: |
          API_URL=$(pulumi stack output apiDomainUrl --stack "$STACK" 2>/dev/null || echo '')
          FRONTEND_URL=$(pulumi stack output frontendBucketEndpoint --stack "$STACK" 2>/dev/null || echo '')
          PIPELINE_ID=$(pulumi stack output pipelineId --stack "$STACK" 2>/dev/null || echo '')
          echo "api_url=$API_URL" >> $GITHUB_OUTPUT
          echo "frontend_url=$FRONTEND_URL" >> $GITHUB_OUTPUT
          echo "pipeline_id=$PIPELINE_ID" >> $GITHUB_OUTPUT

      - name: Sync EDGE_PIPELINE_ID repo variable
        if: steps.outputs.outputs.pipeline_id != '' && vars.EDGE_PIPELINE_ID == ''
        env:
          GH_TOKEN: ${{ secrets.GH_REPO_PAT || secrets.GITHUB_TOKEN }}
          PIPELINE_ID: ${{ steps.outputs.outputs.pipeline_id }}
          ENV_NAME: ${{ needs.setup.outputs.environment }}
        run: |
          # Best-effort: requires a PAT with `actions:write` to set environment variables.
          # Falls back silently with the default GITHUB_TOKEN (which lacks the scope).
          gh variable set EDGE_PIPELINE_ID --env "$ENV_NAME" --body "$PIPELINE_ID" || \
            echo "::warning::Could not set EDGE_PIPELINE_ID repo variable (needs PAT with actions:write). Pipeline id: $PIPELINE_ID"

      - name: Output deployment info
        working-directory: infra
        env:
          AWS_ACCESS_KEY_ID: ${{ secrets.SCW_ACCESS_KEY }}
          AWS_SECRET_ACCESS_KEY: ${{ secrets.SCW_SECRET_KEY }}
          SCW_ACCESS_KEY: ${{ secrets.SCW_ACCESS_KEY }}
          SCW_SECRET_KEY: ${{ secrets.SCW_SECRET_KEY }}
          PULUMI_CONFIG_PASSPHRASE: ${{ secrets.PULUMI_CONFIG_PASSPHRASE }}
          STACK: ${{ needs.setup.outputs.pulumi_stack }}
          ENVIRONMENT: ${{ needs.setup.outputs.environment }}
          IMAGE_TAG: ${{ needs.setup.outputs.image_tag }}
        run: |
          echo "## Deployment Complete" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "**Environment:** $ENVIRONMENT" >> $GITHUB_STEP_SUMMARY
          echo "**Pulumi Stack:** $STACK" >> $GITHUB_STEP_SUMMARY
          echo "**Image Tag:** $IMAGE_TAG" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "### Resources" >> $GITHUB_STEP_SUMMARY
          echo "- **Registry:** $(pulumi stack output registryEndpoint --stack "$STACK")" >> $GITHUB_STEP_SUMMARY
          echo "- **Frontend:** $(pulumi stack output frontendBucketEndpoint --stack "$STACK")" >> $GITHUB_STEP_SUMMARY
          echo "- **Cluster:** $(pulumi stack output clusterHost --stack "$STACK" 2>/dev/null || echo 'not deployed')" >> $GITHUB_STEP_SUMMARY
          echo "- **API Domain:** $(pulumi stack output apiDomainUrl --stack "$STACK" 2>/dev/null || echo 'no domain')" >> $GITHUB_STEP_SUMMARY
          echo "- **Yjs Domain:** $(pulumi stack output yjsDomainUrl --stack "$STACK" 2>/dev/null || echo 'no domain')" >> $GITHUB_STEP_SUMMARY

  # -------------------------------------------------------------------------
  # Roll services — for each backend service (backend, cdc, yjs, ai):
  #   1. PUT the new image SHA into s3://<deploy_tags_bucket>/deploy/<svc>.tag
  #   2. Poll the public health endpoint until X-App-Version == SHA
  #
  # Matrix runs in parallel; `fail-fast: true` cancels siblings the moment one
  # service refuses to roll, so a broken cdc/yjs deploy doesn't have to wait
  # 5 minutes on a separately-stuck backend before the workflow turns red.
  #
  # Tag rollback: re-running the workflow on the previous commit re-PUTs the
  # old SHA. The on-VM reconciler sees the change and rolls back the same way
  # it rolled forward — no separate code path. CI doesn't try to "undo" on
  # failure; that would race the reconciler's own rollback (which only the VM
  # has the local context to do safely).
  # -------------------------------------------------------------------------
  roll-services:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    needs: [setup, pulumi, build-images]
    permissions: {}
    if: >-
      always() &&
      needs.setup.result == 'success' &&
      (needs.pulumi.result == 'success' || needs.pulumi.result == 'skipped') &&
      needs.build-images.result == 'success'
    environment: ${{ needs.setup.outputs.environment }}
    strategy:
      fail-fast: true
      matrix:
        include:
          - service: backend
            health_url: ${{ needs.setup.outputs.backend_url }}
          - service: cdc
            # CDC has no public LB frontend; the worker hosts /health on its
            # private IP only. Skip the live probe step for cdc and rely on
            # the reconciler's own local health check + LB drain to surface
            # failures (a broken cdc takes the backend's CDC websocket down,
            # which fails the backend probe).
            health_url: ''
          - service: yjs
            health_url: ${{ needs.setup.outputs.yjs_url }}
          - service: ai
            health_url: ${{ needs.setup.outputs.ai_url }}
          - service: frontend
            health_url: ${{ needs.setup.outputs.frontend_url }}
    env:
      AWS_ACCESS_KEY_ID: ${{ secrets.SCW_ACCESS_KEY }}
      AWS_SECRET_ACCESS_KEY: ${{ secrets.SCW_SECRET_KEY }}
      TAG_BUCKET: ${{ needs.setup.outputs.deploy_tags_bucket }}
      REGION: ${{ needs.setup.outputs.region }}
      EXPECTED_SHA: ${{ needs.setup.outputs.image_tag }}
      SERVICE: ${{ matrix.service }}
    steps:
      - name: Write deploy tag for ${{ matrix.service }}
        run: |
          ENDPOINT="https://s3.$REGION.scw.cloud"
          echo "Publishing $EXPECTED_SHA to s3://$TAG_BUCKET/deploy/$SERVICE.tag"
          # Plain text body, no newline — reconciler reads it as-is.
          printf '%s' "$EXPECTED_SHA" \
            | aws --endpoint-url "$ENDPOINT" s3 cp - "s3://$TAG_BUCKET/deploy/$SERVICE.tag" \
                --content-type 'text/plain'

      - name: Wait for ${{ matrix.service }} to serve ${{ needs.setup.outputs.image_tag }}
        if: matrix.health_url != ''
        env:
          # URLs come from setup outputs (derived from shared/ appConfig).
          # appConfig URLs are canonical https:// origins; CI probes /health
          # directly without any scheme transformation.
          BASE: ${{ matrix.health_url }}
        run: |
          if [ -z "$BASE" ]; then
            echo "::error::No health URL for $SERVICE in environment ${{ needs.setup.outputs.environment }}"
            exit 1
          fi
          HEALTH_URL="$BASE/health"
          echo "Probing $HEALTH_URL — expecting X-App-Version: $EXPECTED_SHA"

          # Frontend (Caddy) returns 200 with body 'ok'; backend/yjs/ai return
          # 204 with no body. Both emit X-App-Version, which is what we assert.
          # 100 × 3s = 5 min budget per service. Matrix runs in parallel, so
          # wall-clock for the slowest service is the upper bound.
          for i in $(seq 1 100); do
            headers=$(curl -sS -D - -o /dev/null --max-time 8 "$HEALTH_URL" 2>/dev/null || true)
            status=$(printf '%s' "$headers" | awk 'NR==1{print $2}')
            served=$(printf '%s' "$headers" | awk -F': ' 'tolower($1)=="x-app-version"{gsub(/\r/,"",$2); print $2; exit}')

            if { [ "$status" = "204" ] || [ "$status" = "200" ]; } && [ "$served" = "$EXPECTED_SHA" ]; then
              echo "$SERVICE serving $EXPECTED_SHA after ${i} attempts"
              exit 0
            fi
            echo "Attempt $i/100: status=${status:-<none>} served=${served:-<missing>}"
            sleep 3
          done

          echo "::error::$SERVICE did not roll to $EXPECTED_SHA within 5 minutes (last served: ${served:-<unknown>})"
          exit 1

      - name: Fetch ${{ matrix.service }} boot diagnostics on failure
        if: failure()
        env:
          STATE_BUCKET: ${{ needs.setup.outputs.state_bucket }}
        run: |
          ENDPOINT="https://s3.$REGION.scw.cloud"

          echo "::group::Stage markers ($SERVICE-*)"
          aws --endpoint-url "$ENDPOINT" s3 ls "s3://$STATE_BUCKET/boot-diag/" \
            | awk '{print $4}' | grep -E "^${SERVICE}-(stage|[0-9])" | sort | tail -30 || true
          echo "::endgroup::"

          for KEY in $(aws --endpoint-url "$ENDPOINT" s3 ls "s3://$STATE_BUCKET/boot-diag/" \
              | awk '{print $4}' | grep "^${SERVICE}-stage-" | sort | tail -10); do
            echo "::group::$KEY"
            aws --endpoint-url "$ENDPOINT" s3 cp "s3://$STATE_BUCKET/boot-diag/$KEY" - 2>/dev/null || true
            echo
            echo "::endgroup::"
          done

          LATEST=$(aws --endpoint-url "$ENDPOINT" s3 ls "s3://$STATE_BUCKET/boot-diag/" \
            | awk '{print $4}' | grep -E "^${SERVICE}-[0-9]{8}T" | sort | tail -1)
          if [ -n "$LATEST" ]; then
            echo "::group::$SERVICE boot diagnostics ($LATEST)"
            aws --endpoint-url "$ENDPOINT" s3 cp "s3://$STATE_BUCKET/boot-diag/$LATEST" - || true
            echo "::endgroup::"
          else
            echo "::warning::No $SERVICE full boot-diag log uploaded"
          fi

  # -------------------------------------------------------------------------
  # Verify rollout — backward-compatible alias that depends on roll-services.
  # Kept as its own job so the existing branch protection rule
  # ("verify-rollout must pass") stays satisfied without re-configuring repo
  # settings. publish-frontend gates on this too.
  # -------------------------------------------------------------------------
  verify-rollout:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    needs: [setup, pulumi, build-images, roll-services]
    permissions: {}
    if: >-
      always() &&
      needs.setup.result == 'success' &&
      (needs.pulumi.result == 'success' || needs.pulumi.result == 'skipped') &&
      (needs.build-images.result == 'success' || needs.build-images.result == 'skipped') &&
      needs.roll-services.result == 'success'
    environment: ${{ needs.setup.outputs.environment }}
    steps:
      - name: Summarise rollout
        env:
          EXPECTED_SHA: ${{ needs.setup.outputs.image_tag }}
        run: |
          {
            echo "## Rollout"
            echo
            echo "All services serving \`$EXPECTED_SHA\`."
          } >> "$GITHUB_STEP_SUMMARY"

  # -------------------------------------------------------------------------
  # Publish frontend to Object Storage — runs AFTER backend is verified
  # healthy, so users never load a new bundle that calls a not-yet-rolled API.
  # Upload order is strict: versioned chunks first (so they exist when the new
  # index.html references them), then index.html/sw.js/manifest with no-cache.
  # No --delete: stale chunks are garbage-collected by frontend-gc.yml after
  # a safety window, so in-flight tabs on the previous bundle still load.
  # -------------------------------------------------------------------------
  publish-frontend:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    needs: [setup, build-frontend, verify-rollout]
    permissions:
      contents: read
    environment: ${{ needs.setup.outputs.environment }}
    steps:
      - name: Download dist artifact
        uses: actions/download-artifact@018cc2cf5baa6db3ef3c5f8a56943fffe632ef53 # v6
        with:
          name: frontend-dist
          path: dist

      - name: Install Scaleway CLI
        run: |
          curl -sLo /usr/local/bin/scw "https://github.com/scaleway/scaleway-cli/releases/download/v${{ env.SCW_CLI_VERSION }}/scaleway-cli_${{ env.SCW_CLI_VERSION }}_linux_amd64"
          chmod +x /usr/local/bin/scw
          scw version

      - name: Upload versioned assets (long cache, no --delete)
        env:
          AWS_ACCESS_KEY_ID: ${{ secrets.SCW_ACCESS_KEY }}
          AWS_SECRET_ACCESS_KEY: ${{ secrets.SCW_SECRET_KEY }}
          AWS_DEFAULT_REGION: ${{ needs.setup.outputs.region }}
          S3_ENDPOINT: https://s3.${{ needs.setup.outputs.region }}.scw.cloud
          BUCKET_NAME: ${{ needs.setup.outputs.frontend_bucket }}
        # Chunks must exist BEFORE the new index.html is published; old
        # chunks are intentionally retained so already-loaded tabs keep
        # working until frontend-gc.yml prunes them after the safety window.
        run: |
          BUCKET="s3://$BUCKET_NAME"
          aws s3 sync dist/ "$BUCKET/" \
            --endpoint-url "$S3_ENDPOINT" \
            --cache-control "public, max-age=31536000, immutable" \
            --exclude "index.html" \
            --exclude "sw.js" \
            --exclude "sw.js.map" \
            --exclude "manifest.webmanifest" \
            --size-only

      - name: Upload entry files (no-cache) — strictly after assets
        env:
          AWS_ACCESS_KEY_ID: ${{ secrets.SCW_ACCESS_KEY }}
          AWS_SECRET_ACCESS_KEY: ${{ secrets.SCW_SECRET_KEY }}
          AWS_DEFAULT_REGION: ${{ needs.setup.outputs.region }}
          S3_ENDPOINT: https://s3.${{ needs.setup.outputs.region }}.scw.cloud
          BUCKET_NAME: ${{ needs.setup.outputs.frontend_bucket }}
        run: |
          BUCKET="s3://$BUCKET_NAME"
          for f in index.html sw.js manifest.webmanifest; do
            if [ -f "dist/$f" ]; then
              aws s3 cp "dist/$f" "$BUCKET/$f" \
                --endpoint-url "$S3_ENDPOINT" \
                --cache-control "no-cache, no-store, must-revalidate"
            fi
          done

      - name: Purge Edge Services cache for entry files
        env:
          SCW_ACCESS_KEY: ${{ secrets.SCW_ACCESS_KEY }}
          SCW_SECRET_KEY: ${{ secrets.SCW_SECRET_KEY }}
          SCW_DEFAULT_PROJECT_ID: ${{ secrets.SCW_PROJECT_ID }}
          SCW_DEFAULT_ORGANIZATION_ID: ${{ secrets.SCW_ORGANIZATION_ID }}
          SCW_DEFAULT_REGION: ${{ needs.setup.outputs.region }}
          EDGE_PIPELINE_ID: ${{ vars.EDGE_PIPELINE_ID }}
          BUCKET_NAME: ${{ needs.setup.outputs.frontend_bucket }}
        run: |
          set -euo pipefail
          if [ -z "${EDGE_PIPELINE_ID:-}" ]; then
            if [ -z "${SCW_DEFAULT_ORGANIZATION_ID:-}" ]; then
              echo "::warning::EDGE_PIPELINE_ID is not set and SCW_DEFAULT_ORGANIZATION_ID is missing; skipping edge cache purge."
              exit 0
            fi
            EDGE_PIPELINE_ID=$(scw edge-services pipeline list -o json | jq -r ".[] | select(.name | contains(\"$BUCKET_NAME\")) | .id" | head -n1)
          fi
          if [ -n "${EDGE_PIPELINE_ID:-}" ]; then
            scw edge-services purge-request create \
              pipeline-id="$EDGE_PIPELINE_ID" \
              assets.0="index.html" \
              assets.1="sw.js" \
              assets.2="manifest.webmanifest"
          else
            echo "::warning::Could not resolve EDGE_PIPELINE_ID; skipping edge cache purge."
          fi

      - name: Verify served bundle matches uploaded bundle
        env:
          FRONTEND_URL: ${{ needs.setup.outputs.frontend_url }}
        # Compare a stable marker from the just-uploaded index.html against
        # what the edge actually serves with Cache-Control: no-cache. We use
        # the entry script's hashed filename (e.g. /assets/index-abc123.js)
        # extracted from the local index.html — if the served HTML still
        # references the previous hash, the edge purge hasn't propagated
        # (or worse, TLS is broken). 30 × 3s = ~90s budget.
        run: |
          set -uo pipefail
          if [ -z "$FRONTEND_URL" ]; then
            echo "No FRONTEND_URL configured — skipping verify"
            exit 0
          fi

          # Extract the expected entry script src from the freshly uploaded HTML.
          EXPECTED=$(grep -oE 'src="[^"]*assets/[^"]+\.js"' dist/index.html | head -n1 | sed 's/^src="//; s/"$//')
          if [ -z "$EXPECTED" ]; then
            echo "::warning::Could not extract entry asset from dist/index.html; skipping hash verify"
            EXPECTED=""
          else
            echo "Expecting served index.html to reference: $EXPECTED"
          fi

          for i in $(seq 1 30); do
            BODY=$(curl -fsS --max-time 8 -H 'Cache-Control: no-cache' -H 'Pragma: no-cache' "$FRONTEND_URL/index.html" 2>/dev/null)
            rc=$?
            case "$rc" in
              0)
                if [ -z "$EXPECTED" ] || echo "$BODY" | grep -qF "$EXPECTED"; then
                  echo "Frontend serving new bundle after ${i} attempts"
                  exit 0
                fi
                echo "Attempt $i/30: served HTML does not yet reference $EXPECTED"
                ;;
              35|60|51|58|59|66|77|83)
                echo "::error::Frontend TLS failure (curl exit $rc) on $FRONTEND_URL"
                echo "Likely cause: Scaleway Edge Services pipeline has a stuck managed certificate."
                echo "Recover with:"
                echo "  scw edge-services pipeline list -o json | jq -r '.[] | select(.status==\"error\") | .id'"
                echo "  scw edge-services tls-stage list pipeline-id=<id> -o json | jq -r '.[0].id'"
                echo "  scw edge-services tls-stage update <tls-stage-id> managed-certificate=true"
                exit 1
                ;;
              *)
                echo "Attempt $i/30: curl exit $rc"
                ;;
            esac
            sleep 3
          done
          echo "::error::Frontend did not serve the new bundle within ~90s"
          exit 1

  # -------------------------------------------------------------------------
  # Smoke tests — last-mile sanity checks executed against the now-live
  # bundle + API. Intentionally narrow: each probe targets a single HTTP
  # contract that, if broken, would render the app unusable for all users.
  # Anything heavier (auth flows, DB writes) belongs in the e2e suite, not
  # in the critical-path deploy pipeline.
  # -------------------------------------------------------------------------
  smoke-tests:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    needs: [setup, publish-frontend]
    permissions: {}
    if: needs.publish-frontend.result == 'success'
    environment: ${{ needs.setup.outputs.environment }}
    env:
      EXPECTED_SHA: ${{ needs.setup.outputs.image_tag }}
      FRONTEND_URL: ${{ needs.setup.outputs.frontend_url }}
      BACKEND_URL: ${{ needs.setup.outputs.backend_url }}
    steps:
      - name: Frontend index.html resolves and references hashed assets
        run: |
          html=$(curl -fsSL --max-time 10 "$FRONTEND_URL/" \
            -H 'Cache-Control: no-cache' -H 'Pragma: no-cache')
          echo "$html" | grep -qE 'src="[^"]*assets/[^"]+\.js"' \
            || { echo "::error::index.html missing hashed asset reference"; printf '%s\n' "$html" | head -40; exit 1; }

      - name: Backend OpenAPI spec is reachable
        run: |
          # The spec is generated, so a 404 here usually means the API
          # router lost its OpenAPI mount — high-signal smoke target.
          curl -fsS --max-time 10 -o /dev/null "$BACKEND_URL/openapi.json" \
            || { echo "::error::OpenAPI endpoint not reachable"; exit 1; }

      - name: Backend reports the deployed release SHA
        run: |
          # Belt-and-braces: roll-services already proved this, but the bundle
          # cutover happens after. If anything restarted backend in between
          # (LB flap, OOM), catch it here before traffic ramps up.
          served=$(curl -fsSI --max-time 10 "$BACKEND_URL/health" \
            | awk -F': ' 'tolower($1)=="x-app-version"{gsub(/\r/,"",$2); print $2; exit}')
          if [ "$served" != "$EXPECTED_SHA" ]; then
            echo "::error::Backend X-App-Version drift: served=${served:-<missing>} expected=$EXPECTED_SHA"
            exit 1
          fi

      - name: SPA route fallback works (random path returns index.html)
        run: |
          # Caddy rewrites 404s from the S3 origin to /index.html so the
          # client router can take over. A regression here breaks every deep
          # link.
          body=$(curl -fsSL --max-time 10 "$FRONTEND_URL/__smoke_$(date +%s)" \
            -H 'Cache-Control: no-cache' -H 'Pragma: no-cache')
          echo "$body" | grep -qi '<html' \
            || { echo "::error::SPA fallback did not return an HTML document"; exit 1; }

      - name: Frontend security headers are present
        run: |
          # Caddy injects HSTS + the rest of the OWASP-recommended baseline
          # that S3 + Edge Services cannot. If any are missing, the Caddyfile
          # was regressed or the request bypassed Caddy entirely.
          headers=$(curl -fsSI --max-time 10 "$FRONTEND_URL/" \
            -H 'Cache-Control: no-cache' -H 'Pragma: no-cache')
          missing=()
          for h in 'Strict-Transport-Security' 'X-Frame-Options' \
                   'X-Content-Type-Options' 'Referrer-Policy' \
                   'Permissions-Policy' 'Cross-Origin-Opener-Policy'; do
            if ! echo "$headers" | grep -qi "^${h}:"; then
              missing+=("$h")
            fi
          done
          if [ ${#missing[@]} -gt 0 ]; then
            echo "::error::Missing security headers: ${missing[*]}"
            printf '%s\n' "$headers"
            exit 1
          fi

