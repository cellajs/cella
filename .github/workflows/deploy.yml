# =============================================================================
# Scaleway Deployment Workflow
# =============================================================================
# Deploys Raak to Scaleway infrastructure using Pulumi
# Triggered on pushes to main (production) or manually for other environments
# =============================================================================

name: Deploy

# Deny-by-default: each job opts in to the scopes it actually needs.
permissions: {}

on:
  # Automatic deployment to production on main branch
  push:
    branches:
      - main
    paths:
      - 'backend/**'
      - 'cdc/**'
      - 'yjs/**'
      - 'frontend/**'
      - 'infra/**'
      - 'shared/**'
      - 'locales/**'
      - 'json/**'
      - 'sdk/**'
      - 'package.json'
      - 'pnpm-lock.yaml'
      - 'pnpm-workspace.yaml'
      - '.github/workflows/deploy.yml'

  # Manual deployment for any environment
  workflow_dispatch:
    inputs:
      environment:
        description: 'Environment to deploy to'
        required: true
        default: 'production'
        type: choice
        options:
          - staging
          - production

# Prevent concurrent deployments to the same environment
concurrency:
  group: deploy-${{ github.event.inputs.environment || 'production' }}
  cancel-in-progress: false

env:
  NODE_VERSION: '24'
  SCW_CLI_VERSION: '2.54.0'

jobs:
  # -------------------------------------------------------------------------
  # Determine environment and detect which services changed
  # -------------------------------------------------------------------------
  setup:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    permissions:
      contents: read
    outputs:
      environment: ${{ steps.set-env.outputs.environment }}
      pulumi_stack: ${{ steps.derive.outputs.pulumi_stack }}
      registry_ns: ${{ steps.derive.outputs.registry_ns }}
      frontend_bucket: ${{ steps.derive.outputs.frontend_bucket }}
      state_bucket: ${{ steps.derive.outputs.state_bucket }}
      vm_reader_app: ${{ steps.derive.outputs.vm_reader_app }}
      region: ${{ steps.derive.outputs.region }}
      enabled_services_json: ${{ steps.derive.outputs.enabled_services_json }}
      image_tag: ${{ steps.set-env.outputs.image_tag }}
      # Service matrices, derived from appConfig.services enablement so a fork
      # doesn't build/roll a service whose infra is intentionally absent.
      build_images_matrix: ${{ steps.derive.outputs.build_images_matrix }}
      primary_rollout_matrix: ${{ steps.derive.outputs.primary_rollout_matrix }}
      roll_rest_matrix: ${{ steps.derive.outputs.roll_rest_matrix }}
    steps:
      - name: Checkout
        uses: actions/checkout@93cb6efe18208431cddfb8368fd83d5badbf9bfd # v5

      - name: Setup pnpm
        uses: pnpm/action-setup@fc06bc1257f339d1d5d8b3a19a8cae5388b55320 # v5

      - name: Setup Node.js
        uses: actions/setup-node@a0853c24544627f65ddf259abe73b1d18a591444 # v5
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'pnpm'

      - name: Install dependencies
        run: pnpm install --frozen-lockfile --filter infra... --filter shared...

      - name: Determine environment
        id: set-env
        env:
          EVENT_NAME: ${{ github.event_name }}
          INPUT_ENV: ${{ github.event.inputs.environment }}
          GIT_REF: ${{ github.ref }}
          GIT_SHA: ${{ github.sha }}
        run: |
          if [ "$EVENT_NAME" = "workflow_dispatch" ]; then
            ENV="$INPUT_ENV"
          else
            ENV="production"
          fi

          # Production deploys must come from main branch
          if [ "$ENV" = "production" ] && [ "$GIT_REF" != "refs/heads/main" ]; then
            echo "::error::Production deploys are only allowed from the main branch (got $GIT_REF)"
            exit 1
          fi

          echo "environment=$ENV" >> $GITHUB_OUTPUT
          echo "image_tag=$GIT_SHA" >> $GITHUB_OUTPUT

      - name: Derive resource names from shared config
        id: derive
        env:
          ENV: ${{ steps.set-env.outputs.environment }}
        run: pnpm --silent --filter infra print-deploy-env "$ENV" >> $GITHUB_OUTPUT

  # -------------------------------------------------------------------------
  # Build and push Docker images
  # -------------------------------------------------------------------------
  build-images:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    needs: [setup]
    permissions:
      contents: read
      id-token: write   # keyless cosign signing via GitHub OIDC
    strategy:
      fail-fast: false
      matrix:
        include: ${{ fromJSON(needs.setup.outputs.build_images_matrix) }}
    environment: ${{ needs.setup.outputs.environment }}
    steps:
      - name: Checkout
        uses: actions/checkout@93cb6efe18208431cddfb8368fd83d5badbf9bfd # v5

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@4d04d5d9486b7bd6fa91e7baf45bbb4f8b9deedd # v4

      - name: Login to Scaleway Container Registry
        uses: docker/login-action@4907a6ddec9925e35a0a9e82d7399ccc52663121 # v4
        with:
          registry: rg.${{ needs.setup.outputs.region }}.scw.cloud
          username: nologin
          password: ${{ secrets.SCW_SECRET_KEY }}

      - name: Build and push ${{ matrix.service }} image
        id: build
        uses: docker/build-push-action@bcafcacb16a39f128d818304e6c9c0c18556b85f # v7
        with:
          context: .
          file: ${{ matrix.dockerfile }}
          push: true
          tags: rg.${{ needs.setup.outputs.region }}.scw.cloud/${{ needs.setup.outputs.registry_ns }}/${{ matrix.service }}:${{ needs.setup.outputs.image_tag }}
          # RELEASE_SHA is baked into the image as ENV so `/health` can return
          # it. The deploy verifier asserts X-App-Version matches GITHUB_SHA
          # before declaring the rollout green.
          build-args: |
            RELEASE_SHA=${{ needs.setup.outputs.image_tag }}
          cache-from: type=gha,scope=${{ matrix.service }}
          cache-to: type=gha,mode=max,scope=${{ matrix.service }}
          # Push a plain Docker manifest, NOT an OCI image index. With buildx
          # provenance on, the push is an index (image + attestation manifest);
          # Scaleway's registry serves that index inconsistently, so a pull can
          # fail with "repository does not exist / manifest unknown" — most often
          # on a fully-cached build where the attestation is the only fresh push
          # (this is what stranded rakapp/frontend while backend rebuilt real
          # layers). Supply-chain attestation is provided by the cosign keyless
          # signing step below, so dropping buildx provenance loses nothing.
          provenance: false

      # Keyless Sigstore signing via GitHub OIDC. Signature is stored alongside
      # the image in the Scaleway registry as an OCI artifact. Verify later with:
      #   cosign verify --certificate-identity-regexp \
      #     "https://github.com/<owner>/<repo>/.github/workflows/deploy.yml@refs/heads/main" \
      #     --certificate-oidc-issuer https://token.actions.githubusercontent.com \
      #     rg.<region>.scw.cloud/<ns>/<service>@<digest>
      - name: Install cosign
        uses: sigstore/cosign-installer@6f9f17788090df1f26f669e9d70d6ae9567deba6 # v4.1.2

      - name: Sign image with cosign (keyless)
        env:
          IMAGE: rg.${{ needs.setup.outputs.region }}.scw.cloud/${{ needs.setup.outputs.registry_ns }}/${{ matrix.service }}
          DIGEST: ${{ steps.build.outputs.digest }}
        # Retry to ride out transient Sigstore (Fulcio/Rekor) HTTP/2 stream resets
        # that surface as `INTERNAL_ERROR; received from peer`. The sign call is
        # idempotent — re-signing the same digest just appends another signature.
        run: |
          for attempt in 1 2 3 4 5; do
            if cosign sign --yes "${IMAGE}@${DIGEST}"; then
              exit 0
            fi
            echo "::warning::cosign sign attempt $attempt failed; retrying in $((attempt * 5))s"
            sleep $((attempt * 5))
          done
          echo "::error::cosign sign failed after 5 attempts"
          exit 1

  # -------------------------------------------------------------------------
  # Build frontend bundle (no upload). Runs in parallel with build-images so
  # the artifact is ready when publish-frontend gates on backend health.
  # -------------------------------------------------------------------------
  build-frontend:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    needs: [setup]
    permissions:
      contents: read
    environment: ${{ needs.setup.outputs.environment }}
    steps:
      - name: Checkout
        uses: actions/checkout@93cb6efe18208431cddfb8368fd83d5badbf9bfd # v5

      - name: Setup pnpm
        uses: pnpm/action-setup@fc06bc1257f339d1d5d8b3a19a8cae5388b55320 # v5

      - name: Setup Node.js
        uses: actions/setup-node@a0853c24544627f65ddf259abe73b1d18a591444 # v5
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'pnpm'

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build frontend
        env:
          ENABLED_SERVICES_JSON: ${{ needs.setup.outputs.enabled_services_json }}
        run: |
          VITE_BACKEND_URL=$(echo "$ENABLED_SERVICES_JSON" | jq -r '.[] | select(.service == "backend") | .public_url // empty')
          VITE_FRONTEND_URL=$(echo "$ENABLED_SERVICES_JSON" | jq -r '.[] | select(.service == "frontend") | .public_url // empty')
          if [ -z "$VITE_BACKEND_URL" ] || [ -z "$VITE_FRONTEND_URL" ]; then
            echo "::error::frontend/backend public URLs are required to build the frontend"
            exit 1
          fi
          VITE_BACKEND_URL="$VITE_BACKEND_URL" VITE_FRONTEND_URL="$VITE_FRONTEND_URL" pnpm --filter frontend build

      - name: Upload dist artifact
        uses: actions/upload-artifact@b7c566a772e6b6bfb58ed0dc250532a479d7789f # v6
        with:
          name: frontend-dist
          path: frontend/dist
          retention-days: 7
          if-no-files-found: error

  # -------------------------------------------------------------------------
  # Apply Pulumi infrastructure
  # -------------------------------------------------------------------------
  pulumi:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    needs: [setup]
    # contents: read for checkout. The `Sync EDGE_PIPELINE_ID` step writes a repo
    # variable but uses GH_REPO_PAT (the default GITHUB_TOKEN lacks actions:write
    # even if granted here), so no extra scope is needed on this token.
    permissions:
      contents: read
    environment: ${{ needs.setup.outputs.environment }}
    steps:
      - name: Checkout
        uses: actions/checkout@93cb6efe18208431cddfb8368fd83d5badbf9bfd # v5

      - name: Setup pnpm
        uses: pnpm/action-setup@fc06bc1257f339d1d5d8b3a19a8cae5388b55320 # v5

      - name: Setup Node.js
        uses: actions/setup-node@a0853c24544627f65ddf259abe73b1d18a591444 # v5
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'pnpm'

      # Use the official Pulumi action (SHA-pinned) in install-only mode instead
      # of `curl | sh` to remove unverified runtime downloads from the deploy path.
      # CLI version is pinned to match the @pulumi/pulumi SDK in infra/package.json;
      # bump both together. See https://github.com/pulumi/actions/releases.
      - name: Install Pulumi CLI
        uses: pulumi/actions@8e5e406f4007fca908480587cb9893c07090f58d # v7.0.0
        with:
          pulumi-version: 3.236.0

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Ensure Pulumi state bucket exists
        env:
          SCW_ACCESS_KEY: ${{ secrets.SCW_ACCESS_KEY }}
          SCW_SECRET_KEY: ${{ secrets.SCW_SECRET_KEY }}
        run: pnpm --filter infra ensure-state-bucket

      - name: Login to S3 state backend
        env:
          AWS_ACCESS_KEY_ID: ${{ secrets.SCW_ACCESS_KEY }}
          AWS_SECRET_ACCESS_KEY: ${{ secrets.SCW_SECRET_KEY }}
          STATE_BUCKET: ${{ needs.setup.outputs.state_bucket }}
          REGION: ${{ needs.setup.outputs.region }}
        run: pulumi login "s3://$STATE_BUCKET?endpoint=s3.$REGION.scw.cloud&region=$REGION"

      - name: Select stack
        working-directory: infra
        env:
          # AWS_* = state-bucket S3 access only. `pulumi stack select` does not
          # need Scaleway provider credentials — those are supplied as SCW_* env
          # to the `pulumi up` step below (the provider no longer reads
          # scaleway:accessKey/secretKey/projectId from stack config).
          AWS_ACCESS_KEY_ID: ${{ secrets.SCW_ACCESS_KEY }}
          AWS_SECRET_ACCESS_KEY: ${{ secrets.SCW_SECRET_KEY }}
          PULUMI_CONFIG_PASSPHRASE: ${{ secrets.PULUMI_CONFIG_PASSPHRASE }}
          STACK: ${{ needs.setup.outputs.pulumi_stack }}
        # The release SHA is Pulumi config: `pulumi up` bakes it into the new VM
        # generation's cloud-init so a release and an infra change use the same
        # immutable-node replacement path.
        run: pulumi stack select "$STACK"

      # Pre-install the Scaleway resource plugin as a discrete, retryable step
      # BEFORE `pulumi up` downloads it implicitly. Pulumi fetches provider
      # plugin binaries from GitHub releases; unauthenticated those share a
      # 60-req/hr-per-IP limit that GitHub-hosted runners routinely exhaust,
      # surfacing as `rate limit exceeded: 403` mid-deploy. Passing GITHUB_TOKEN
      # makes the download authenticated (5000/hr) and caching it here means the
      # later `pulumi up` steps (base infra + deploy-service bookends) find it on
      # disk. Version is derived from the installed npm package so it can't drift.
      - name: Pre-install Pulumi providers
        working-directory: infra
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          version=$(node -p "require('@pulumiverse/scaleway/package.json').version")
          for attempt in 1 2 3 4 5; do
            if pulumi plugin install resource scaleway "v$version"; then
              echo "scaleway plugin v$version installed"
              break
            fi
            echo "plugin install attempt $attempt failed; retrying in 15s"
            sleep 15
          done
          pulumi plugin ls

      # Pulumi prep (checkout, install, login, stack select) runs in
      # parallel with build-images / build-frontend. Gate the registry wait
      # before the deploy proceeds: a fresh/replaced VM pulls the pinned SHA
      # during cloud-init and fails boot if the image isn't pushed yet.
      #
      # The wait loop (and the "exclude ai / include frontend" rule) lives in
      # infra/tasks/wait-for-images.ts, unit-tested against the service matrix
      # so the set can't silently drift. Uses
      # `docker buildx imagetools inspect` under the hood because Scaleway's
      # registry requires the Docker bearer-token flow.
      - name: Wait for image tags in registry
        env:
          SCW_SECRET_KEY: ${{ secrets.SCW_SECRET_KEY }}
          REGION: ${{ needs.setup.outputs.region }}
          REGISTRY_NS: ${{ needs.setup.outputs.registry_ns }}
          TAG: ${{ needs.setup.outputs.image_tag }}
          BUILD_IMAGES_MATRIX: ${{ needs.setup.outputs.build_images_matrix }}
        run: |
          set -uo pipefail
          REGISTRY="rg.$REGION.scw.cloud"
          echo "$SCW_SECRET_KEY" | docker login "$REGISTRY" -u nologin --password-stdin >/dev/null
          # Only wait for images that were actually built — the build matrix is
          # already feature-flag gated, so a disabled service (e.g. yjs) is
          # absent here and must not block the deploy.
          SERVICES=$(echo "$BUILD_IMAGES_MATRIX" | jq -r '[.[].service] | join(",")')
          pnpm --filter infra wait-for-images --registry "$REGISTRY" --ns "$REGISTRY_NS" --tag "$TAG" --services "$SERVICES"

      - name: Pulumi up (base infra)
        working-directory: infra
        env:
          AWS_ACCESS_KEY_ID: ${{ secrets.SCW_ACCESS_KEY }}
          AWS_SECRET_ACCESS_KEY: ${{ secrets.SCW_SECRET_KEY }}
          # Scaleway provider authenticates from these env vars (the CI deploy
          # key) — scaleway:accessKey/secretKey/projectId are no longer stored in
          # Pulumi.<env>.yaml. SCW_PROJECT_ID / SCW_ORGANIZATION_ID are GitHub
          # secrets synced by github-sync.ts alongside the key pair on every
          # CI-key rotation. The org id lets helpers.ts derive the IAM
          # application ids without the Account API (the CI key can read IAM but
          # not `read project`).
          SCW_ACCESS_KEY: ${{ secrets.SCW_ACCESS_KEY }}
          SCW_SECRET_KEY: ${{ secrets.SCW_SECRET_KEY }}
          SCW_DEFAULT_PROJECT_ID: ${{ secrets.SCW_PROJECT_ID }}
          SCW_DEFAULT_ORGANIZATION_ID: ${{ secrets.SCW_ORGANIZATION_ID }}
          PULUMI_CONFIG_PASSPHRASE: ${{ secrets.PULUMI_CONFIG_PASSPHRASE }}
          # Authenticate any implicit provider-plugin re-fetch (5000/hr vs the
          # unauthenticated 60/hr shared limit that surfaced as a mid-deploy 403).
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          STACK: ${{ needs.setup.outputs.pulumi_stack }}
        run: |
          pnpm --filter infra sync-rollout-config --stack "$STACK"
          pulumi up --stack "$STACK" --yes

      - name: Verify VM reader IAM grant
        # Belt-and-suspenders for the failure that took prod down: a VM whose key
        # cannot decrypt runtime secrets crash-loops behind a 502 with no auto
        # recovery. `pulumi up` above reconciles the Pulumi-managed vm-reader
        # policy (infra/resources/vm-iam.ts), and this read-only check confirms
        # the live application actually holds every required permission set
        # BEFORE any VM that depends on it is rolled/replaced. Fails the deploy
        # loudly (naming the missing sets) instead of letting a fleet-wide 502
        # surface only after rollout.
        working-directory: infra
        env:
          AWS_ACCESS_KEY_ID: ${{ secrets.SCW_ACCESS_KEY }}
          AWS_SECRET_ACCESS_KEY: ${{ secrets.SCW_SECRET_KEY }}
          PULUMI_CONFIG_PASSPHRASE: ${{ secrets.PULUMI_CONFIG_PASSPHRASE }}
          SCW_SECRET_KEY: ${{ secrets.SCW_SECRET_KEY }}
          SCW_DEFAULT_PROJECT_ID: ${{ secrets.SCW_PROJECT_ID }}
          SCW_DEFAULT_ORGANIZATION_ID: ${{ secrets.SCW_ORGANIZATION_ID }}
          STACK: ${{ needs.setup.outputs.pulumi_stack }}
          VM_READER_APP: ${{ needs.setup.outputs.vm_reader_app }}
        run: |
          # Resolve the VM reader application id by its deterministic name and
          # source the project from the synced SCW_PROJECT_ID secret — neither
          # the app id nor the project id is stored in stack config anymore
          # (SOVRUN §3.3); the Pulumi program derives them from the IAM API.
          # Pass the org id so assert-vm-grants skips the Account `read project`
          # call (the CI key lacks that permission) and lists IAM policies
          # directly.
          pnpm --filter infra assert-vm-grants --application-name "$VM_READER_APP" --project-id "$SCW_DEFAULT_PROJECT_ID" --organization-id "$SCW_DEFAULT_ORGANIZATION_ID"

      - name: Verify runtime secrets are deliverable
        # Second belt-and-suspenders preflight for a prod-down class: a `required`
        # runtime secret that cannot be written into the line-based
        # /opt/app/.env.runtime (e.g. a raw multi-line PEM) fails the on-VM
        # runtime-secret-sync, which by design blocks the service from booting —
        # exactly how a multi-line DATABASE_SSL_CA took the backend down. `pulumi
        # up` writing the value isn't enough; this read-only check fetches each
        # required secret the way a VM will and asserts it is single-line and
        # present BEFORE any VM rolls, failing the deploy with the offending env
        # vars instead of after a fleet-wide outage. Scoped to the enabled
        # services this fork actually deploys so a disabled service's optional
        # secret never trips it.
        working-directory: infra
        env:
          SCW_SECRET_KEY: ${{ secrets.SCW_SECRET_KEY }}
          REGION: ${{ needs.setup.outputs.region }}
          SCW_DEFAULT_PROJECT_ID: ${{ secrets.SCW_PROJECT_ID }}
          SERVICES_MATRIX: ${{ needs.setup.outputs.enabled_services_json }}
        run: |
          SERVICES=$(echo "$SERVICES_MATRIX" | jq -r '[.[].service] | join(",")')
          pnpm --filter infra assert-secrets-deliverable --region "$REGION" --project-id "$SCW_DEFAULT_PROJECT_ID" --services "$SERVICES"

      - name: Deploy primary VM generation with explicit cutover
        working-directory: infra
        env:
          AWS_ACCESS_KEY_ID: ${{ secrets.SCW_ACCESS_KEY }}
          AWS_SECRET_ACCESS_KEY: ${{ secrets.SCW_SECRET_KEY }}
          SCW_ACCESS_KEY: ${{ secrets.SCW_ACCESS_KEY }}
          SCW_SECRET_KEY: ${{ secrets.SCW_SECRET_KEY }}
          SCW_DEFAULT_PROJECT_ID: ${{ secrets.SCW_PROJECT_ID }}
          SCW_DEFAULT_ORGANIZATION_ID: ${{ secrets.SCW_ORGANIZATION_ID }}
          SCW_DEFAULT_REGION: ${{ needs.setup.outputs.region }}
          PULUMI_CONFIG_PASSPHRASE: ${{ secrets.PULUMI_CONFIG_PASSPHRASE }}
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          STACK: ${{ needs.setup.outputs.pulumi_stack }}
          IMAGE_TAG: ${{ needs.setup.outputs.image_tag }}
          RUN_NUMBER: ${{ github.run_number }}
          PRIMARY_ROLLOUT_MATRIX: ${{ needs.setup.outputs.primary_rollout_matrix }}
        run: |
          set -euo pipefail
          count=$(echo "$PRIMARY_ROLLOUT_MATRIX" | jq 'length')
          if [ "$count" -eq 0 ]; then
            echo "No primary rollout service configured — skipping."
            exit 0
          fi
          if [ "$count" -gt 1 ]; then
            echo "::error::Expected at most one primary rollout service, got $count"
            exit 1
          fi
          item=$(echo "$PRIMARY_ROLLOUT_MATRIX" | jq -c '.[0]')
          service=$(echo "$item" | jq -r '.service')
          health_url=$(echo "$item" | jq -r '.health_url')
          pnpm --filter infra deploy-service --service "$service" --sha "$IMAGE_TAG" --stack "$STACK" --gen "$RUN_NUMBER" --health-url "$health_url"

      - name: Deploy remaining VM generations with explicit cutover
        working-directory: infra
        env:
          AWS_ACCESS_KEY_ID: ${{ secrets.SCW_ACCESS_KEY }}
          AWS_SECRET_ACCESS_KEY: ${{ secrets.SCW_SECRET_KEY }}
          SCW_ACCESS_KEY: ${{ secrets.SCW_ACCESS_KEY }}
          SCW_SECRET_KEY: ${{ secrets.SCW_SECRET_KEY }}
          SCW_DEFAULT_PROJECT_ID: ${{ secrets.SCW_PROJECT_ID }}
          SCW_DEFAULT_ORGANIZATION_ID: ${{ secrets.SCW_ORGANIZATION_ID }}
          SCW_DEFAULT_REGION: ${{ needs.setup.outputs.region }}
          PULUMI_CONFIG_PASSPHRASE: ${{ secrets.PULUMI_CONFIG_PASSPHRASE }}
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          STACK: ${{ needs.setup.outputs.pulumi_stack }}
          IMAGE_TAG: ${{ needs.setup.outputs.image_tag }}
          RUN_NUMBER: ${{ github.run_number }}
          ROLL_REST_MATRIX: ${{ needs.setup.outputs.roll_rest_matrix }}
        run: |
          set -euo pipefail
          echo "$ROLL_REST_MATRIX" | jq -c '.[]' | while read -r item; do
            service=$(echo "$item" | jq -r '.service')
            health_url=$(echo "$item" | jq -r '.health_url')
            if [ -n "$health_url" ]; then
              pnpm --filter infra deploy-service --service "$service" --sha "$IMAGE_TAG" --stack "$STACK" --gen "$RUN_NUMBER" --health-url "$health_url"
            else
              pnpm --filter infra deploy-service --service "$service" --sha "$IMAGE_TAG" --stack "$STACK" --gen "$RUN_NUMBER"
            fi
          done

      - name: Capture stack outputs
        id: outputs
        working-directory: infra
        env:
          AWS_ACCESS_KEY_ID: ${{ secrets.SCW_ACCESS_KEY }}
          AWS_SECRET_ACCESS_KEY: ${{ secrets.SCW_SECRET_KEY }}
          PULUMI_CONFIG_PASSPHRASE: ${{ secrets.PULUMI_CONFIG_PASSPHRASE }}
          STACK: ${{ needs.setup.outputs.pulumi_stack }}
        run: |
          PIPELINE_ID=$(pulumi stack output pipelineId --stack "$STACK" 2>/dev/null || echo '')
          echo "pipeline_id=$PIPELINE_ID" >> $GITHUB_OUTPUT

      - name: Sync EDGE_PIPELINE_ID repo variable
        if: steps.outputs.outputs.pipeline_id != '' && vars.EDGE_PIPELINE_ID == ''
        env:
          GH_TOKEN: ${{ secrets.GH_REPO_PAT || secrets.GITHUB_TOKEN }}
          PIPELINE_ID: ${{ steps.outputs.outputs.pipeline_id }}
          ENV_NAME: ${{ needs.setup.outputs.environment }}
        run: |
          # Best-effort: requires a PAT with `actions:write` to set environment variables.
          # Falls back silently with the default GITHUB_TOKEN (which lacks the scope).
          gh variable set EDGE_PIPELINE_ID --env "$ENV_NAME" --body "$PIPELINE_ID" || \
            echo "::warning::Could not set EDGE_PIPELINE_ID repo variable (needs PAT with actions:write). Pipeline id: $PIPELINE_ID"

      - name: Output deployment info
        working-directory: infra
        env:
          AWS_ACCESS_KEY_ID: ${{ secrets.SCW_ACCESS_KEY }}
          AWS_SECRET_ACCESS_KEY: ${{ secrets.SCW_SECRET_KEY }}
          SCW_ACCESS_KEY: ${{ secrets.SCW_ACCESS_KEY }}
          SCW_SECRET_KEY: ${{ secrets.SCW_SECRET_KEY }}
          PULUMI_CONFIG_PASSPHRASE: ${{ secrets.PULUMI_CONFIG_PASSPHRASE }}
          STACK: ${{ needs.setup.outputs.pulumi_stack }}
          ENVIRONMENT: ${{ needs.setup.outputs.environment }}
          IMAGE_TAG: ${{ needs.setup.outputs.image_tag }}
        run: |
          echo "## Deployment Complete" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "**Environment:** $ENVIRONMENT" >> $GITHUB_STEP_SUMMARY
          echo "**Pulumi Stack:** $STACK" >> $GITHUB_STEP_SUMMARY
          echo "**Image Tag:** $IMAGE_TAG" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "### Resources" >> $GITHUB_STEP_SUMMARY
          echo "- **Registry:** $(pulumi stack output registryEndpoint --stack "$STACK")" >> $GITHUB_STEP_SUMMARY
          echo "- **Frontend:** $(pulumi stack output frontendBucketEndpoint --stack "$STACK")" >> $GITHUB_STEP_SUMMARY
          echo "- **Cluster:** $(pulumi stack output clusterHost --stack "$STACK" 2>/dev/null || echo 'not deployed')" >> $GITHUB_STEP_SUMMARY
          # One line per LB-exposed service, straight from the registry-driven map.
          pulumi stack output serviceDomainUrls --stack "$STACK" 2>/dev/null \
            | jq -r 'to_entries[] | "- **\(.key) domain:** \(.value)"' >> $GITHUB_STEP_SUMMARY \
            || echo "- **Domains:** no domain" >> $GITHUB_STEP_SUMMARY

  # -------------------------------------------------------------------------
  # Verify the rollout — the pulumi job above runs deploy-service per VM service
  # (image SHA baked into cloud-init, explicit LB cutover for public services).
  # These jobs only confirm each public service serves the expected SHA
  # (X-App-Version == SHA), preserving the existing branch-protection shape.
  #
  # The primary rollout service (the one that owns migrations) verifies first,
  # then the rest in parallel. cdc has no public health endpoint; its replacement
  # is confirmed indirectly by the primary public service coming up healthy.
  #
  # Rollback: re-run the workflow on the previous commit — it provisions a new
  # generation from that SHA the same way it rolled forward (no separate path).
  # -------------------------------------------------------------------------
  roll-backend:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    needs: [setup, pulumi, build-images]
    # contents: read is required for actions/checkout below. The repo is
    # private, so an empty token ({}) makes checkout fail with
    # "Repository not found". Only the checkout scope is needed; the health poll
    # uses Scaleway creds, not the GITHUB_TOKEN.
    permissions:
      contents: read
    if: >-
      always() &&
      needs.setup.result == 'success' &&
      (needs.pulumi.result == 'success' || needs.pulumi.result == 'skipped') &&
      needs.build-images.result == 'success'
    environment: ${{ needs.setup.outputs.environment }}
    strategy:
      fail-fast: true
      matrix:
        include: ${{ fromJSON(needs.setup.outputs.primary_rollout_matrix) }}
    env:
      REGION: ${{ needs.setup.outputs.region }}
      EXPECTED_SHA: ${{ needs.setup.outputs.image_tag }}
      SERVICE: ${{ matrix.service }}
    steps:
      - name: Checkout
        uses: actions/checkout@93cb6efe18208431cddfb8368fd83d5badbf9bfd # v5

      - name: Setup pnpm
        uses: pnpm/action-setup@fc06bc1257f339d1d5d8b3a19a8cae5388b55320 # v5

      - name: Setup Node.js
        uses: actions/setup-node@a0853c24544627f65ddf259abe73b1d18a591444 # v5
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'pnpm'

      - name: Install dependencies
        run: pnpm install --frozen-lockfile --filter infra...

      - name: Wait for ${{ matrix.service }} to serve ${{ needs.setup.outputs.image_tag }}
        if: matrix.health_url != ''
        env:
          # URLs come from setup outputs (derived from shared/ appConfig).
          # appConfig URLs are canonical https:// origins; CI probes /health
          # directly. deploy-service already cut over this service; this only
          # confirms it is serving the expected SHA. Frontend
          # (Caddy) returns 200, backend/yjs/ai 204; both emit X-App-Version.
          BASE: ${{ matrix.health_url }}
        run: pnpm --filter infra wait-for-version --url "$BASE/health" --sha "$EXPECTED_SHA"

  # -------------------------------------------------------------------------
  # Roll the remaining services — runs ONLY after roll-backend is green, so the
  # expand migration (run at the backend generation's boot) is applied. These
  # roll in parallel.
  # -------------------------------------------------------------------------
  roll-rest:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    needs: [setup, pulumi, build-images, roll-backend]
    permissions:
      contents: read
    if: >-
      always() &&
      needs.setup.result == 'success' &&
      (needs.pulumi.result == 'success' || needs.pulumi.result == 'skipped') &&
      needs.build-images.result == 'success' &&
      needs.roll-backend.result == 'success'
    environment: ${{ needs.setup.outputs.environment }}
    strategy:
      fail-fast: true
      matrix:
        # cdc + frontend always; yjs/ai included only when their feature flag is
        # on (see the "Build service matrices" step in setup). ai reuses the
        # backend image; the probe confirms the AI LB serves the expected SHA.
        include: ${{ fromJSON(needs.setup.outputs.roll_rest_matrix) }}
    env:
      REGION: ${{ needs.setup.outputs.region }}
      EXPECTED_SHA: ${{ needs.setup.outputs.image_tag }}
      SERVICE: ${{ matrix.service }}
    steps:
      - name: Checkout
        uses: actions/checkout@93cb6efe18208431cddfb8368fd83d5badbf9bfd # v5

      - name: Setup pnpm
        uses: pnpm/action-setup@fc06bc1257f339d1d5d8b3a19a8cae5388b55320 # v5

      - name: Setup Node.js
        uses: actions/setup-node@a0853c24544627f65ddf259abe73b1d18a591444 # v5
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'pnpm'

      - name: Install dependencies
        run: pnpm install --frozen-lockfile --filter infra...

      - name: Wait for ${{ matrix.service }} to serve ${{ needs.setup.outputs.image_tag }}
        if: matrix.health_url != ''
        env:
          BASE: ${{ matrix.health_url }}
        run: pnpm --filter infra wait-for-version --url "$BASE/health" --sha "$EXPECTED_SHA"

  # -------------------------------------------------------------------------
  # Verify rollout — backward-compatible alias that depends on the roll jobs.
  # Kept as its own job so the existing branch protection rule
  # ("verify-rollout must pass") stays satisfied without re-configuring repo
  # settings. publish-frontend gates on this too.
  # -------------------------------------------------------------------------
  verify-rollout:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    needs: [setup, pulumi, build-images, roll-backend, roll-rest]
    permissions: {}
    if: >-
      always() &&
      needs.setup.result == 'success' &&
      (needs.pulumi.result == 'success' || needs.pulumi.result == 'skipped') &&
      (needs.build-images.result == 'success' || needs.build-images.result == 'skipped') &&
      needs.roll-backend.result == 'success' &&
      needs.roll-rest.result == 'success'
    environment: ${{ needs.setup.outputs.environment }}
    strategy:
      fail-fast: true
      matrix:
        include: ${{ fromJSON(needs.setup.outputs.enabled_services_json) }}
    env:
      EXPECTED_SHA: ${{ needs.setup.outputs.image_tag }}
      SERVICE: ${{ matrix.service }}
    steps:
      - name: Summarise rollout
        env:
          EXPECTED_SHA: ${{ needs.setup.outputs.image_tag }}
        run: |
          {
            echo "## Rollout"
            echo
            echo "All services serving \`$EXPECTED_SHA\`."
          } >> "$GITHUB_STEP_SUMMARY"

  # -------------------------------------------------------------------------
  # Upload versioned (content-hashed, immutable) frontend assets to the bucket.
  #
  # These chunks are purely additive: nothing references them until the new
  # index.html is flipped in `publish-frontend`, and already-loaded tabs keep
  # using their old chunks. That makes this safe to run EARLY — in parallel
  # with pulumi / roll-backend / roll-rest — instead of gating it behind the
  # backend rollout. Only the entry-file flip (publish-frontend) must wait for
  # verify-rollout. A deploy that fails after this job merely leaves some
  # unreferenced immutable chunks behind, which the bucket's time-based
  # `expire-stale-assets` lifecycle rule prunes after the safety window.
  # -------------------------------------------------------------------------
  upload-frontend-assets:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    needs: [setup, build-frontend]
    permissions:
      contents: read
    environment: ${{ needs.setup.outputs.environment }}
    steps:
      - name: Download dist artifact
        uses: actions/download-artifact@018cc2cf5baa6db3ef3c5f8a56943fffe632ef53 # v6
        with:
          name: frontend-dist
          path: dist

      - name: Upload versioned assets (long cache, no --delete)
        env:
          AWS_ACCESS_KEY_ID: ${{ secrets.SCW_ACCESS_KEY }}
          AWS_SECRET_ACCESS_KEY: ${{ secrets.SCW_SECRET_KEY }}
          AWS_DEFAULT_REGION: ${{ needs.setup.outputs.region }}
          S3_ENDPOINT: https://s3.${{ needs.setup.outputs.region }}.scw.cloud
          BUCKET_NAME: ${{ needs.setup.outputs.frontend_bucket }}
        # Chunks must exist BEFORE the new index.html is published; old
        # chunks are intentionally retained so already-loaded tabs keep
        # working until the bucket's `expire-stale-assets` lifecycle rule
        # prunes them after the safety window.
        #
        # Intentionally NOT using --size-only: the default size+mtime sync
        # re-uploads every chunk in the current build, refreshing its
        # LastModified. This keeps still-referenced (e.g. long-lived vendor)
        # chunks "fresh" so the time-based lifecycle rule only expires chunks
        # that are absent from recent builds — never ones still in use.
        run: |
          BUCKET="s3://$BUCKET_NAME"
          aws s3 sync dist/ "$BUCKET/" \
            --endpoint-url "$S3_ENDPOINT" \
            --cache-control "public, max-age=31536000, immutable" \
            --exclude "index.html" \
            --exclude "sw.js" \
            --exclude "sw.js.map" \
            --exclude "manifest.webmanifest"

  # -------------------------------------------------------------------------
  # Atomic frontend flip: publish the mutable entry files and purge the edge
  # cache so users start loading the new build. Deliberately thin and on the
  # critical path AFTER verify-rollout — the versioned chunks it references are
  # already in the bucket (uploaded in parallel by `upload-frontend-assets`).
  # -------------------------------------------------------------------------
  publish-frontend:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    needs: [setup, upload-frontend-assets, verify-rollout]
    permissions:
      contents: read
    environment: ${{ needs.setup.outputs.environment }}
    steps:
      # Checkout + Node are needed for the verify-frontend-bundle task at the
      # end of this job. Done first so the artifact download lands alongside.
      - name: Checkout
        uses: actions/checkout@93cb6efe18208431cddfb8368fd83d5badbf9bfd # v5

      - name: Setup pnpm
        uses: pnpm/action-setup@fc06bc1257f339d1d5d8b3a19a8cae5388b55320 # v5

      - name: Setup Node.js
        uses: actions/setup-node@a0853c24544627f65ddf259abe73b1d18a591444 # v5
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'pnpm'

      - name: Install dependencies
        run: pnpm install --frozen-lockfile --filter infra...

      - name: Download dist artifact
        uses: actions/download-artifact@018cc2cf5baa6db3ef3c5f8a56943fffe632ef53 # v6
        with:
          name: frontend-dist
          path: dist

      - name: Install Scaleway CLI
        run: |
          curl -sLo /usr/local/bin/scw "https://github.com/scaleway/scaleway-cli/releases/download/v${{ env.SCW_CLI_VERSION }}/scaleway-cli_${{ env.SCW_CLI_VERSION }}_linux_amd64"
          chmod +x /usr/local/bin/scw
          scw version

      - name: Upload entry files (no-cache) — strictly after assets
        env:
          AWS_ACCESS_KEY_ID: ${{ secrets.SCW_ACCESS_KEY }}
          AWS_SECRET_ACCESS_KEY: ${{ secrets.SCW_SECRET_KEY }}
          AWS_DEFAULT_REGION: ${{ needs.setup.outputs.region }}
          S3_ENDPOINT: https://s3.${{ needs.setup.outputs.region }}.scw.cloud
          BUCKET_NAME: ${{ needs.setup.outputs.frontend_bucket }}
        run: |
          BUCKET="s3://$BUCKET_NAME"
          for f in index.html sw.js manifest.webmanifest; do
            if [ -f "dist/$f" ]; then
              aws s3 cp "dist/$f" "$BUCKET/$f" \
                --endpoint-url "$S3_ENDPOINT" \
                --cache-control "no-cache, no-store, must-revalidate"
            fi
          done

      - name: Purge Edge Services cache for entry files
        env:
          SCW_ACCESS_KEY: ${{ secrets.SCW_ACCESS_KEY }}
          SCW_SECRET_KEY: ${{ secrets.SCW_SECRET_KEY }}
          SCW_DEFAULT_PROJECT_ID: ${{ secrets.SCW_PROJECT_ID }}
          SCW_DEFAULT_ORGANIZATION_ID: ${{ secrets.SCW_ORGANIZATION_ID }}
          SCW_DEFAULT_REGION: ${{ needs.setup.outputs.region }}
          EDGE_PIPELINE_ID: ${{ vars.EDGE_PIPELINE_ID }}
          BUCKET_NAME: ${{ needs.setup.outputs.frontend_bucket }}
        run: |
          set -euo pipefail
          if [ -z "${EDGE_PIPELINE_ID:-}" ]; then
            if [ -z "${SCW_DEFAULT_ORGANIZATION_ID:-}" ]; then
              echo "::warning::EDGE_PIPELINE_ID is not set and SCW_DEFAULT_ORGANIZATION_ID is missing; skipping edge cache purge."
              exit 0
            fi
            EDGE_PIPELINE_ID=$(scw edge-services pipeline list -o json | jq -r ".[] | select(.name | contains(\"$BUCKET_NAME\")) | .id" | head -n1)
          fi
          if [ -n "${EDGE_PIPELINE_ID:-}" ]; then
            scw edge-services purge-request create \
              pipeline-id="$EDGE_PIPELINE_ID" \
              assets.0="index.html" \
              assets.1="sw.js" \
              assets.2="manifest.webmanifest"
          else
            echo "::warning::Could not resolve EDGE_PIPELINE_ID; skipping edge cache purge."
          fi

      - name: Verify served bundle matches uploaded bundle
        env:
          ENABLED_SERVICES_JSON: ${{ needs.setup.outputs.enabled_services_json }}
        # Compare a stable marker from the just-uploaded index.html against what
        # the edge actually serves with Cache-Control: no-cache. The HTML parse,
        # TLS-error classification and poll loop live in
        # infra/tasks/verify-frontend-bundle.ts (unit tested). 30 × 3s = ~90s.
        run: |
          FRONTEND_URL=$(echo "$ENABLED_SERVICES_JSON" | jq -r '.[] | select(.service == "frontend") | .public_url // empty')
          if [ -z "$FRONTEND_URL" ]; then
            echo "No FRONTEND_URL configured — skipping verify"
            exit 0
          fi
          # The artifact downloads to $GITHUB_WORKSPACE/dist, but `pnpm --filter
          # infra` runs in infra/, so the --dist path must be absolute — a
          # relative dist/index.html would resolve to a missing infra/dist and
          # the task now hard-fails instead of silently accepting any response.
          pnpm --filter infra verify-frontend-bundle --url "$FRONTEND_URL" --dist "$GITHUB_WORKSPACE/dist/index.html"

  # -------------------------------------------------------------------------
  # Smoke tests — last-mile sanity checks executed against the now-live
  # bundle + API. Intentionally narrow: each probe targets a single HTTP
  # contract that, if broken, would render the app unusable for all users.
  # Anything heavier (auth flows, DB writes) belongs in the e2e suite, not
  # in the critical-path deploy pipeline.
  # -------------------------------------------------------------------------
  smoke-tests:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    needs: [setup, publish-frontend]
    # contents: read is required for actions/checkout below (private repo).
    permissions:
      contents: read
    if: needs.publish-frontend.result == 'success'
    environment: ${{ needs.setup.outputs.environment }}
    env:
      EXPECTED_SHA: ${{ needs.setup.outputs.image_tag }}
      ENABLED_SERVICES_JSON: ${{ needs.setup.outputs.enabled_services_json }}
    steps:
      - name: Checkout
        uses: actions/checkout@93cb6efe18208431cddfb8368fd83d5badbf9bfd # v5

      - name: Setup pnpm
        uses: pnpm/action-setup@fc06bc1257f339d1d5d8b3a19a8cae5388b55320 # v5

      - name: Setup Node.js
        uses: actions/setup-node@a0853c24544627f65ddf259abe73b1d18a591444 # v5
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'pnpm'

      - name: Install dependencies
        run: pnpm install --frozen-lockfile --filter infra...

      # Last-mile probes (hashed-asset, OpenAPI reachable, service SHA drift,
      # SPA fallback, security headers, component health) live in the unit-tested infra/tasks/smoke.ts.
      # It runs every check before failing so one deploy surfaces all breakage.
      - name: Run smoke checks
        run: |
          FRONTEND_URL=$(echo "$ENABLED_SERVICES_JSON" | jq -r '.[] | select(.service == "frontend") | .public_url // empty')
          BACKEND_URL=$(echo "$ENABLED_SERVICES_JSON" | jq -r '.[] | select(.service == "backend") | .public_url // empty')
          if [ -z "$FRONTEND_URL" ] || [ -z "$BACKEND_URL" ]; then
            echo "::error::frontend/backend public URLs are required for smoke checks"
            exit 1
          fi
          pnpm --filter infra smoke --frontend "$FRONTEND_URL" --backend "$BACKEND_URL" --sha "$EXPECTED_SHA" --services-json "$ENABLED_SERVICES_JSON"

