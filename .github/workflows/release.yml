name: Release

# release-please maintains a "release PR" per package from Conventional Commits.
# Merging that PR bumps the version, updates the CHANGELOG, creates the git tag
# and publishes the GitHub Release. Publishing that Release triggers the Deploy
# workflow (deploy.yml, `on: release`), which runs the heavy release-gate and
# then rolls out to production.
#
# This workflow only ever runs release-please bookkeeping, so every push to main
# produces a small, uniform run. The heavy gate + production deploy live in the
# separate Deploy action, which appears only when a release is actually cut.
#
# Add a new releasable package by adding an entry to .github/release-please-config.json
# and .github/release-please-manifest.json. No workflow changes needed.

permissions: {}

on:
  push:
    branches: [main]

concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: false

jobs:
  release-please:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pull-requests: write
    steps:
      # Mint a short-lived token from the cella release GitHub App. Using an App
      # token (not the default GITHUB_TOKEN) lets the release PR be created AND
      # makes it trigger the CI/pr-title checks required for merge.
      - name: Generate app token
        id: app-token
        uses: actions/create-github-app-token@bcd2ba49218906704ab6c1aa796996da409d3eb1 # v3.2.0
        with:
          client-id: ${{ secrets.RELEASE_APP_ID }}
          private-key: ${{ secrets.RELEASE_APP_PRIVATE_KEY }}

      - name: Run release-please
        id: release
        uses: googleapis/release-please-action@45996ed1f6d02564a971a2fa1b5860e934307cf7 # v5.0.0
        with:
          token: ${{ steps.app-token.outputs.token }}
          config-file: .github/release-please-config.json
          manifest-file: .github/release-please-manifest.json
