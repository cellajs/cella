name: Release

# release-please maintains a "release PR" per package from Conventional Commits.
# Merging that PR bumps the version, updates the CHANGELOG, creates the git tag
# and publishes the GitHub Release. When a release is cut, the `release-gate` job
# runs heavy security + e2e checks, and publishing (npm + undrafting the
# create-cella release) only happens if the gate passes.
#
# Add a new releasable package by adding an entry to .github/release-please-config.json
# and .github/release-please-manifest.json — no workflow changes needed.

permissions: {}

on:
  push:
    branches: [main]

concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: false

jobs:
  release-please:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pull-requests: write
    outputs:
      releases-created: ${{ steps.release.outputs.releases_created }}
      create-cella-released: ${{ steps.release.outputs['cli/create-cella--release_created'] }}
      create-cella-tag: ${{ steps.release.outputs['cli/create-cella--tag_name'] }}
    steps:
      # Mint a short-lived token from the cella release GitHub App. Using an App
      # token (not the default GITHUB_TOKEN) lets the release PR be created AND
      # makes it trigger the CI/pr-title checks required for merge.
      - name: Generate app token
        id: app-token
        uses: actions/create-github-app-token@bcd2ba49218906704ab6c1aa796996da409d3eb1 # v3.2.0
        with:
          client-id: ${{ secrets.RELEASE_APP_ID }}
          private-key: ${{ secrets.RELEASE_APP_PRIVATE_KEY }}

      - name: Run release-please
        id: release
        uses: googleapis/release-please-action@45996ed1f6d02564a971a2fa1b5860e934307cf7 # v5.0.0
        with:
          token: ${{ steps.app-token.outputs.token }}
          config-file: .github/release-please-config.json
          manifest-file: .github/release-please-manifest.json

  # Release-only gate: heavy security + e2e checks that we don't want on every
  # feature PR. Nothing is published unless this passes (publish jobs `needs` it).
  # Runs only when a release was actually cut this push.
  release-gate:
    needs: release-please
    if: ${{ needs.release-please.outputs.releases-created == 'true' }}
    runs-on: ubuntu-latest
    timeout-minutes: 25
    permissions:
      contents: read
    services:
      postgres:
        image: postgres:17
        env:
          POSTGRES_DB: postgres
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
        ports:
          - 5432:5432
    steps:
      - name: Checkout repo
        uses: actions/checkout@93cb6efe18208431cddfb8368fd83d5badbf9bfd # v5

      - name: Setup pnpm
        uses: pnpm/action-setup@fc06bc1257f339d1d5d8b3a19a8cae5388b55320 # v5

      - name: Setup Node.js
        uses: actions/setup-node@a0853c24544627f65ddf259abe73b1d18a591444 # v5
        with:
          node-version: 24
          cache: "pnpm"

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Security audit (high+ severity)
        run: pnpm audit --audit-level=high

      # The create-cella e2e test scaffolds a project and runs `git commit`,
      # which needs an author identity the runner doesn't have by default.
      - name: Configure git identity
        run: |
          git config --global user.email "ci@cellajs.com"
          git config --global user.name "cella CI"

      - name: Create .env files
        run: |
          cp ./backend/.env.example ./backend/.env
          cp ./frontend/.env.example ./frontend/.env

      - name: Install Playwright browsers
        run: cd frontend && pnpm exec playwright install

      - name: Generate OpenAPI spec
        run: pnpm sdk

      - name: Run database migrations
        run: pnpm --filter backend push
        env:
          DATABASE_URL: postgresql://postgres:postgres@localhost:5432/postgres

      - name: Run tests (full mode)
        run: pnpm test:full
        env:
          DATABASE_URL: postgresql://postgres:postgres@localhost:5432/postgres

  # Publish @cellajs/create-cella to npm, then make its (drafted) GitHub Release
  # public. Gated on release-gate so a failed security/e2e run ships nothing.
  publish-create-cella:
    needs: [release-please, release-gate]
    if: ${{ needs.release-please.outputs.create-cella-released == 'true' }}
    runs-on: ubuntu-latest
    permissions:
      contents: write # undraft the GitHub Release
      id-token: write # npm provenance
    steps:
      - name: Checkout repo
        uses: actions/checkout@93cb6efe18208431cddfb8368fd83d5badbf9bfd # v5

      - name: Setup pnpm
        uses: pnpm/action-setup@fc06bc1257f339d1d5d8b3a19a8cae5388b55320 # v5

      - name: Setup Node.js
        uses: actions/setup-node@a0853c24544627f65ddf259abe73b1d18a591444 # v5
        with:
          node-version: 24
          cache: "pnpm"
          registry-url: "https://registry.npmjs.org"

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build create-cella
        run: pnpm --filter @cellajs/create-cella build

      - name: Publish to npm
        run: pnpm --filter @cellajs/create-cella publish --no-git-checks --access public --provenance
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}

      - name: Publish GitHub Release (undraft)
        run: gh release edit "$TAG" --draft=false
        env:
          TAG: ${{ needs.release-please.outputs.create-cella-tag }}
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}