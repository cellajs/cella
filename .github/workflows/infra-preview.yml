# =============================================================================
# Infra preview on PRs
# =============================================================================
# Runs `pulumi preview` against the production stack for any PR that touches
# infrastructure code, and posts the plan as a job summary so reviewers can
# see what would change before merging. Read-only — never calls `pulumi up`.
# =============================================================================

name: Infra preview

permissions:
  contents: read
  pull-requests: write

on:
  pull_request:
    paths:
      - 'infra/**'
      - 'shared/**'
      - '.github/workflows/infra-preview.yml'

concurrency:
  group: infra-preview-${{ github.event.pull_request.number }}
  cancel-in-progress: true

env:
  NODE_VERSION: '24'

jobs:
  preview:
    # Skip preview for PRs from forks — they cannot access repo secrets, and
    # we do not want to expose Scaleway/Pulumi credentials to fork code.
    if: github.event.pull_request.head.repo.full_name == github.repository
    # Source SCW_*/PULUMI_CONFIG_PASSPHRASE from the production Environment.
    # Repo-level secrets were removed so credentials live in one place only.
    environment: production
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - name: Checkout
        uses: actions/checkout@93cb6efe18208431cddfb8368fd83d5badbf9bfd # v5

      - name: Setup pnpm
        uses: pnpm/action-setup@fc06bc1257f339d1d5d8b3a19a8cae5388b55320 # v5

      - name: Setup Node.js
        uses: actions/setup-node@a0853c24544627f65ddf259abe73b1d18a591444 # v5
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'pnpm'

      - name: Install Pulumi CLI
        run: curl -fsSL https://get.pulumi.com | sh -s && echo "$HOME/.pulumi/bin" >> $GITHUB_PATH

      - name: Install dependencies
        run: pnpm install --frozen-lockfile --filter infra... --filter shared...

      - name: Derive stack + state bucket
        id: derive
        run: pnpm --filter infra print-deploy-env production >> $GITHUB_OUTPUT

      - name: Ensure Pulumi state bucket exists
        env:
          SCW_ACCESS_KEY: ${{ secrets.SCW_ACCESS_KEY }}
          SCW_SECRET_KEY: ${{ secrets.SCW_SECRET_KEY }}
        run: pnpm --filter infra ensure-state-bucket

      - name: Login to S3 state backend
        env:
          AWS_ACCESS_KEY_ID: ${{ secrets.SCW_ACCESS_KEY }}
          AWS_SECRET_ACCESS_KEY: ${{ secrets.SCW_SECRET_KEY }}
          STATE_BUCKET: ${{ steps.derive.outputs.state_bucket }}
          REGION: ${{ steps.derive.outputs.region }}
        run: pulumi login "s3://$STATE_BUCKET?endpoint=s3.$REGION.scw.cloud&region=$REGION"

      - name: Pulumi preview
        working-directory: infra
        env:
          # AWS_* = state-bucket S3 access only. Scaleway provider credentials come
          # from the encrypted `scaleway:accessKey` / `scaleway:secretKey` stack
          # config values.
          AWS_ACCESS_KEY_ID: ${{ secrets.SCW_ACCESS_KEY }}
          AWS_SECRET_ACCESS_KEY: ${{ secrets.SCW_SECRET_KEY }}
          SCW_DEFAULT_PROJECT_ID: ${{ secrets.SCW_PROJECT_ID }}
          PULUMI_CONFIG_PASSPHRASE: ${{ secrets.PULUMI_CONFIG_PASSPHRASE }}
          STACK: ${{ steps.derive.outputs.pulumi_stack }}
        run: |
          pulumi stack select "$STACK"
          {
            echo '## Pulumi preview — `'"$STACK"'`'
            echo ''
            echo '```'
            pulumi preview --stack "$STACK" --diff 2>&1 | tee /tmp/preview.txt
            echo '```'
          } >> "$GITHUB_STEP_SUMMARY"
