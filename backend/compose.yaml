name: ${PROJECT_SLUG}

volumes:
  pg_data:
  pg_test_data:

services:
  db:
    container_name: ${PROJECT_SLUG}_db
    build: ./db
    environment:
      POSTGRES_DB: postgres
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    command:
      - -c
      - wal_level=logical
      - -c
      - max_connections=500
      - -c
      - max_wal_senders=10
      - -c
      - max_replication_slots=10
      - -c
      - max_slot_wal_keep_size=2GB
    ports:
      - ${DB_PORT}:5432
    restart: always
    volumes:
      - pg_data:/var/lib/postgresql/data

  db_test:
    container_name: ${PROJECT_SLUG}_db_test
    build: ./db
    environment:
      POSTGRES_DB: postgres
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    # Logical replication so CDC integration tests can create slots (matches `db`).
    command:
      - -c
      - wal_level=logical
      - -c
      - max_connections=500
      - -c
      - max_wal_senders=10
      - -c
      - max_replication_slots=10
      - -c
      - max_slot_wal_keep_size=2GB
    ports:
      - ${DB_TEST_PORT}:5432
    profiles:
      - test
    volumes:
      - pg_test_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 2s
      timeout: 5s
      retries: 15
      start_period: 5s
