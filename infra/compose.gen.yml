# DO NOT EDIT — generated from infra/compose/ by `pnpm --filter infra compose:synth`.
# Edit services.config.ts (the fork-owned service registry) and re-run synth.
# Deploy machinery and rationale live in infrastructure.ts.

services:
  backend:
    image: ${REGISTRY}/backend:${BACKEND_TAG:-latest}
    profiles: [backend]
    restart: unless-stopped
    ports:
      - '4000:4000'
      - '4001:4001'
      - '4002:4002'
      - '4003:4003'
    stop_grace_period: '30s'
    env_file:
      - .env
      - .env.runtime
    environment:
      NODE_ENV: production
      APP_MODE: ${APP_MODE:-production}
      TZ: UTC
      FRONTEND_URL: ${FRONTEND_URL}
      BACKEND_URL: ${BACKEND_URL}
      RUN_MIGRATIONS_ON_BOOT: 'false'
      API_WS_URL: ${API_WS_URL}
      CDC_HEALTH_PORT: '4001'
      YJS_PORT: '4002'
      MCP_API_URL: ${MCP_API_URL}
    healthcheck:
      test: ['CMD', 'wget', '-qO-', 'http://127.0.0.1:4000/health']
      interval: '30s'
      timeout: '5s'
      retries: 3
      start_period: '15s'
    x-service:
      slug: backend
      healthPort: 4000
      healthTimeoutSeconds: 240
      runMigrate: true
      replacementStrategy: lb-overlap
      drainSeconds: 10
      instanceType:
        production: DEV1-S
        staging: DEV1-S
      primaryRollout: true
      drainPolicy: requests
      lbRoute: path
      lbPathBegin: /api
      dockerfile: Dockerfile
      target: backend
  migrate:
    image: ${REGISTRY}/backend:${BACKEND_TAG:-latest}
    profiles: [backend]
    restart: 'no'
    env_file:
      - .env
      - .env.runtime
    environment:
      NODE_ENV: production
      APP_MODE: ${APP_MODE:-production}
      TZ: UTC
      MODE: migrate
      FRONTEND_URL: ${FRONTEND_URL}
      BACKEND_URL: ${BACKEND_URL}
  cdc:
    image: ${REGISTRY}/cdc:${CDC_TAG:-latest}
    profiles: [cdc]
    restart: unless-stopped
    ports:
      - '4001:4001'
    stop_grace_period: '30s'
    env_file:
      - .env
      - .env.runtime
    environment:
      NODE_ENV: production
      APP_MODE: ${APP_MODE:-production}
      TZ: UTC
      API_WS_URL: ${API_WS_URL}
      BACKEND_URL: ${BACKEND_URL}
      CDC_HEALTH_PORT: '4001'
    healthcheck:
      test: ['CMD', 'wget', '-qO-', 'http://127.0.0.1:4001/health']
      interval: '30s'
      timeout: '5s'
      retries: 3
      start_period: '10s'
    x-service:
      slug: cdc
      healthPort: 4001
      healthTimeoutSeconds: 90
      runMigrate: false
      replacementStrategy: exclusive
      drainSeconds: 0
      instanceType: DEV1-S
      dockerfile: Dockerfile
      target: cdc
      coHosted: true
      bindings:
        API_WS_URL: ws://@{backend.privateIp}:@{backend.port}/internal/cdc
  yjs:
    image: ${REGISTRY}/yjs:${YJS_TAG:-latest}
    profiles: [yjs]
    restart: unless-stopped
    ports:
      - '4002:4002'
    stop_grace_period: '30s'
    env_file:
      - .env
      - .env.runtime
    environment:
      NODE_ENV: production
      APP_MODE: ${APP_MODE:-production}
      TZ: UTC
      BACKEND_URL: ${BACKEND_URL}
      YJS_PORT: '4002'
    healthcheck:
      test: ['CMD', 'wget', '-qO-', 'http://127.0.0.1:4002/health']
      interval: '30s'
      timeout: '5s'
      retries: 3
      start_period: '10s'
    x-service:
      slug: yjs
      healthPort: 4002
      healthTimeoutSeconds: 90
      runMigrate: false
      replacementStrategy: lb-overlap
      drainSeconds: 5
      instanceType: DEV1-S
      drainPolicy: reconnect
      lbRoute: path
      lbPathBegin: /yjs
      lbWebsockets: true
      dockerfile: Dockerfile
      target: yjs
      coHosted: true
  mcp:
    image: ${REGISTRY}/backend:${MCP_TAG:-latest}
    profiles: [mcp]
    restart: unless-stopped
    ports:
      - '4003:4003'
    stop_grace_period: '30s'
    env_file:
      - .env
      - .env.runtime
    environment:
      NODE_ENV: production
      APP_MODE: ${APP_MODE:-production}
      TZ: UTC
      MODE: mcp-worker
      PORT: '4003'
      FRONTEND_URL: ${FRONTEND_URL}
      BACKEND_URL: ${BACKEND_URL}
      MCP_API_URL: ${MCP_API_URL}
    healthcheck:
      test: ['CMD', 'wget', '-qO-', 'http://127.0.0.1:4003/health']
      interval: '30s'
      timeout: '5s'
      retries: 3
      start_period: '15s'
    x-service:
      slug: mcp
      healthPort: 4003
      healthTimeoutSeconds: 240
      runMigrate: false
      replacementStrategy: lb-overlap
      drainSeconds: 10
      instanceType: DEV1-S
      drainPolicy: requests
      lbRoute: path
      lbPathBegin: /mcp
      reusesImageOf: backend
      coHosted: true
      bindings:
        MCP_API_URL: '@{self.url}'
  frontend:
    image: ${REGISTRY}/frontend:${FRONTEND_TAG:-latest}
    profiles: [frontend]
    restart: unless-stopped
    ports:
      - '80:80'
    stop_grace_period: '30s'
    environment:
      FRONTEND_CSP: ${FRONTEND_CSP}
      ORIGIN_HOST: ${ORIGIN_HOST}
    healthcheck:
      test: ['CMD', 'wget', '-qO-', 'http://127.0.0.1:80/health']
      interval: '30s'
      timeout: '5s'
      retries: 3
      start_period: '10s'
    x-service:
      slug: frontend
      healthPort: 80
      healthTimeoutSeconds: 90
      runMigrate: false
      replacementStrategy: lb-overlap
      drainSeconds: 0
      instanceType: DEV1-S
      drainPolicy: requests
      lbRoute: default
      dockerfile: infra/caddy/Dockerfile
